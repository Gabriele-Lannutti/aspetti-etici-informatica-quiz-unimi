{q: "Secondo la Direttiva 31/2000/CE, il prestatore di un servizio di hosting:", opts: ["È responsabile diretto di tutti i contenuti caricati dagli utenti e deve verificarli preventivamente prima della pubblicazione","Ha l\'obbligo di monitorare costantemente tutti i contenuti degli utenti alla ricerca di materiale illecito","Non è responsabile delle informazioni memorizzate a richiesta di un utente, purché non ne sia a conoscenza dell\'illiceità","Deve identificare con documento d\'identità ogni utente che carica contenuti sulla sua piattaforma online"], ans: 2, expl: "Il prestatore di hosting non è responsabile se non conosce l\'illiceità. Nessun obbligo generale di sorveglianza.", cat: "PRIV"},
{q: "La Società per Azioni (Spa) si distingue dalla Società in nome collettivo (Snc) perché:", opts: ["Nella Spa i soci rispondono illimitatamente e solidalmente per tutte le obbligazioni sociali contratte","Nella Snc il capitale sociale minimo è di 120.000 euro e la gestione è affidata a un consiglio di amministrazione","Nella Snc esiste una separazione formale tra la qualifica di socio e quella di amministratore della società","Nella Spa la responsabilità dei soci è limitata al capitale conferito e il patrimonio personale non è aggredibile"], ans: 3, expl: "Nella Spa (società di capitali) la responsabilità è limitata al capitale conferito. Nella Snc i soci rispondono illimitatamente.", cat: "ECON"},
{q: "Lo switching cost costituisce una barriera all\'entrata perché:", opts: ["Rappresenta il costo che i consumatori dovrebbero sostenere per cambiare lo standard di riferimento o il fornitore","Indica il costo di produzione che un\'impresa sostiene per passare da un processo artigianale a uno industriale","È il costo fiscale imposto dallo Stato alle imprese che intendono entrare in un nuovo settore economico","Rappresenta l\'investimento pubblicitario minimo necessario per far conoscere un nuovo marchio ai consumatori"], ans: 0, expl: "Lo switching cost è il costo di cambiamento per passare a nuovo standard/fornitore.", cat: "ECON"},
{q: "Secondo Deborah Johnson, il riconoscimento che la tecnologia non è costituita solo da artefatti, ma da artefatti incorporati nelle pratiche sociali, è essenziale per:", opts: ["Comprendere la connessione tra etica e tecnologie dell\'informazione e fondare lo studio della Computer Ethics","Progettare interfacce grafiche più intuitive e accessibili per gli utenti meno esperti di tecnologia","Determinare il prezzo ottimale di vendita dei prodotti software sul mercato internazionale, anche in considerazione delle circostanze specifiche del caso","Calcolare il ritorno economico degli investimenti in ricerca e sviluppo delle aziende tecnologiche, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 0, expl: "Johnson: riconoscere la tecnologia come \'prodotto sociale\' è il presupposto per la Computer Ethics.", cat: "ETICA"},
{q: "I sistemi di videosorveglianza sollevano questioni di privacy perché:", opts: ["Le immagini e i suoni catturati sono considerati dati personali dalla normativa e ricevono le stesse tutele","Le telecamere di sorveglianza possono funzionare esclusivamente in ambienti pubblici senza alcun vincolo normativo","La normativa vigente sulla protezione dei dati personali non si applica ai sistemi di videosorveglianza in quanto strumenti finalizzati alla sicurezza pubblica","Le immagini registrate non possono mai essere conservate per un periodo superiore alle ventiquattro ore"], ans: 0, expl: "La normativa include suoni e immagini nella definizione di dato personale, con stesse tutele.", cat: "PRIV"},
{q: "La Società Cooperativa Sociale si distingue dalle altre cooperative perché:", opts: ["Non ha alcun vincolo sul numero minimo di soci e può essere costituita anche da una sola persona, anche in considerazione delle circostanze specifiche del caso","Promuove l\'integrazione sociale attraverso servizi sociosanitari/educativi e l\'inserimento lavorativo di persone svantaggiate","Ha come unico scopo il profitto economico e la distribuzione degli utili tra i soci in proporzione alle quote, tenendo conto degli aspetti normativi e regolamentari applicabili","Può essere costituita esclusivamente da enti pubblici e non ammette la partecipazione di privati cittadini, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "La cooperativa sociale promuove integrazione tramite servizi sociosanitari/educativi e inserimento lavorativo di persone svantaggiate.", cat: "ECON"}
,
{q: "La Product Function Structure (PFS) e la Product Breakdown Structure (PBS) sono strumenti utilizzati nella fase di:", opts: ["Esecuzione del progetto, per monitorare lo stato di avanzamento delle attività operative, anche in considerazione delle circostanze specifiche del caso","Sequenziamento, per calcolare il percorso critico e allocare le risorse disponibili, tenendo conto degli aspetti normativi e regolamentari applicabili","Definizione del progetto, per descrivere rispettivamente le funzioni da realizzare e gli output da sviluppare","Terminazione, per redigere il rapporto finale e consegnare i risultati al committente, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "PFS descrive le funzioni, PBS gli output. Entrambi sono alberi prodotti nella fase di Definizione del progetto.", cat: "COSTI"},
{q: "L\'elasticità di prezzo incrociata misura:", opts: ["Il grado in cui le vendite di un\'impresa sono influenzate dalle variazioni di prezzo praticate da un\'altra impresa del settore","Il rapporto tra la variazione del costo fisso unitario e la variazione del volume di produzione complessivo, anche in considerazione delle circostanze specifiche del caso","La sensibilità della domanda di un prodotto rispetto alle variazioni del reddito medio dei consumatori, tenendo conto degli aspetti normativi e regolamentari applicabili","L\'effetto di una variazione del tasso di interesse sulla propensione al risparmio delle famiglie, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "L\'elasticità incrociata di prezzo eP,ij misura quanto le vendite dell\'impresa j sono influenzate da variazioni di prezzo dell\'impresa i.", cat: "ECON"},
{q: "La steganografia è una tecnica che permette di:", opts: ["Nascondere un messaggio all\'interno di un altro contenuto (immagine, audio, video) in modo che la sua presenza non sia rilevabile","Cifrare un messaggio utilizzando una chiave pubblica e una privata secondo lo standard RSA, anche in considerazione delle circostanze specifiche del caso","Autenticare l\'identità di un utente tramite la scansione biometrica delle impronte digitali, tenendo conto degli aspetti normativi e regolamentari applicabili","Comprimere i dati in modo irreversibile per ridurre lo spazio occupato sui supporti di memorizzazione, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "La steganografia nasconde un messaggio dentro un altro contenuto. È citata tra gli strumenti di difesa digitale insieme a Tor e crittografia.", cat: "SOCDIG"},
{q: "Il protocollo TCP/IP è stato progettato nel:", opts: ["1957, contestualmente all\'invenzione del primo circuito integrato da parte di Jack Kilby della Texas Instruments","1984, come evoluzione del protocollo HTTP per il World Wide Web ideato da Tim Berners-Lee","1947, ai Bell Labs insieme all\'invenzione del transistor da parte di Shockley, Bardeen e Brattain","1973, da Robert Kahn e Vincent Cerf, gettando le basi per quella che oggi conosciamo come Internet"], ans: 3, expl: "TCP/IP nasce nel 1973 da Kahn e Cerf. Con la commutazione a pacchetto di Paul Baran nasce Internet.", cat: "ETICA"},
{q: "Il primo transistor è stato inventato nel:", opts: ["1951, dalla Remington Rand nei laboratori che svilupparono lo UNIVAC I","1965, da Gordon Moore contestualmente alla formulazione della sua famosa legge","1834, da Charles Babbage come componente dell\'Analytical Engine progettato in Inghilterra","1947, ai Bell Labs da William Shockley, John Bardeen e Walter Brattain"], ans: 3, expl: "Dicembre 1947, Bell Labs: Shockley, Bardeen e Brattain inventano il transistor. Passaggio tecnologico cruciale.", cat: "ETICA"},
{q: "Il primo corso universitario di Computer Ethics in Italia è stato tenuto nel:", opts: ["2008, al Politecnico di Torino, come primo insegnamento italiano dedicato all\'etica informatica","1968, all\'Università di Bologna, contestualmente alla pubblicazione di Parker sulle regole etiche","1995, alla De Montfort University nel Regno Unito come parte del programma CCSR europeo","1985, all\'Università di Milano, in concomitanza con la pubblicazione del GNU Manifesto di Stallman"], ans: 0, expl: "Il primo corso di Computer Ethics in Italia fu tenuto al Politecnico di Torino nel 2008 (Norberto Patrignani).", cat: "ETICA"},
{q: "Una fotografia, ai fini della normativa sulla privacy, è considerata:", opts: ["Un dato personale, in quanto informazione relativa a una persona fisica identificata o identificabile","Un dato sensibile, in quanto rivela informazioni sull\'aspetto fisico e l\'origine etnica della persona","Un dato anonimo, salvo che non sia accompagnata dal nome e cognome della persona ritratta","Un dato non rilevante ai fini della protezione dei dati personali vigente nell\'ordinamento italiano"], ans: 0, expl: "La fotografia è un dato personale perché permette di identificare una persona. Non è dato sensibile (categoria tassativa diversa).", cat: "PRIV"},
{q: "Il significato di una sequenza di byte dipende:", opts: ["Dall\'interprete che la legge: la stessa sequenza può rappresentare testo, immagine o istruzione a seconda del contesto","Esclusivamente dal sistema operativo installato sul dispositivo, indipendentemente dal software applicativo, anche in considerazione delle circostanze specifiche del caso","Dalla lunghezza della sequenza stessa: sequenze corte sono sempre testo e sequenze lunghe immagini, tenendo conto degli aspetti normativi e regolamentari applicabili","Dal protocollo di rete utilizzato per trasmetterla, che ne determina univocamente il formato, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "La semantica dei byte è data dall\'interprete (Macchina di Turing): la stessa sequenza binaria può significare cose diverse.", cat: "SOCDIG"},
{q: "Il diritto di cronaca può entrare in conflitto con il diritto all\'oblio quando:", opts: ["Una notizia non più attuale viene costantemente ripubblicata in rete dai motori di ricerca, ledendo la reputazione dell\'interessato","Un giornalista pubblica un articolo contenente esclusivamente fatti di dominio pubblico e di rilevanza attuale, anche in considerazione delle circostanze specifiche del caso","L\'interessato ha espressamente autorizzato la pubblicazione e la diffusione dei propri dati personali, tenendo conto degli aspetti normativi e regolamentari applicabili","La notizia riguarda un personaggio pubblico nell\'esercizio delle proprie funzioni istituzionali attuali, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Il conflitto sorge quando notizie non più attuali restano accessibili online. Il Garante ha precisato che la diffusione generalizzata di notizie non attuali viola il diritto all\'oblio.", cat: "PRIV"},
{q: "Un ebook può essere distribuito con licenza Creative Commons?", opts: ["Sì, le licenze CC sono applicabili a tutte le opere protette dal diritto d\'autore, inclusi testi e pubblicazioni digitali","No, le licenze CC sono applicabili esclusivamente a fotografie, brani musicali e contenuti audiovisivi, anche in considerazione delle circostanze specifiche del caso","Sì, ma solo se l\'ebook è stato preventivamente registrato presso l\'ufficio brevetti e marchi europeo, tenendo conto degli aspetti normativi e regolamentari applicabili","No, gli ebook sono protetti esclusivamente dalla normativa sul brevetto industriale e non dal diritto d\'autore, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Le CC sono applicabili a tutte le opere protette dal diritto d\'autore: letteratura, cinema, musica, fotografia. Gli ebook rientrano.", cat: "PROPR"},
{q: "Secondo Lessig, i quattro strumenti principali per la governance di Internet sono:", opts: ["Hardware, software, firmware e middleware, che costituiscono l\'architettura tecnica della rete globale","Educazione (codici etici), leggi (vincoli legali), architettura tecnologica e mercato (autoregolazione)","Brevetti, marchi, copyright e segreti commerciali, come forme di protezione della proprietà intellettuale","Parlamento, governo, magistratura e autorità garante, come organi istituzionali di controllo della rete"], ans: 1, expl: "Lessig (Code and Other Laws of Cyberspace, 1999): educazione (soft-laws), leggi (hard-laws), architettura tecnologica, mercato.", cat: "ETICA"},
{q: "Nello Stato Patrimoniale, la voce \'Crediti verso soci per versamenti ancora dovuti\' è classificata:", opts: ["Nel Passivo, tra i debiti a breve termine dell\'impresa verso i propri azionisti e soci fondatori, anche in considerazione delle circostanze specifiche del caso","Nell\'Attivo, come prima voce (A), e rappresenta la parte di capitale sottoscritta ma non ancora versata dai soci","Nel Conto Economico, tra i ricavi straordinari derivanti dall\'attività di finanziamento dei soci, tenendo conto degli aspetti normativi e regolamentari applicabili","Nel Passivo, sotto il Patrimonio Netto, come componente negativa che riduce il capitale sociale, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Nello SP è la voce A dell\'Attivo: crediti verso soci per la parte di capitale sottoscritta ma non ancora versata.", cat: "ECON"},
{q: "Le misure minime di sicurezza nel trattamento dei dati personali sono disciplinate:", opts: ["Nell\'Allegato B (disciplinare tecnico) del Codice in materia di protezione dei dati personali (D.Lgs. 196/03)","Nella Direttiva 95/46/CE, che stabilisce solo principi generali senza specificare misure tecniche concrete","Nel Codice della Proprietà Industriale (D.Lgs. 30/2005), che disciplina brevetti e marchi registrati","Nella Legge 633/41 sul diritto d\'autore, nella sezione dedicata alla protezione delle opere digitali"], ans: 0, expl: "Le misure minime di sicurezza sono disciplinate dagli artt. 34-35 del D.Lgs. 196/03 e dall\'Allegato B (disciplinare tecnico).", cat: "PRIV"},
{q: "Il livello 6 dell\'arcobaleno dei diritti della cittadinanza digitale corrisponde a:", opts: ["Il diritto all\'accesso al servizio universale (access), come prerequisito per ogni forma di partecipazione","Il diritto ad essere ascoltati e consultati (consultation), con feedback da parte dell\'istituzione","Il diritto alla trasparenza (transparency), ovvero il diritto a ricevere informazioni dalla PA","Il diritto al coinvolgimento attivo nelle scelte e nelle politiche (active participation) della PA"], ans: 1, expl: "Livello 6 = consultazione (ascolto). I cittadini forniscono informazioni che richiedono feedback dall\'istituzione.", cat: "DEMOC"},
{q: "L\'esempio dei sottopassaggi di Long Island progettati da Robert Moses dimostra che:", opts: ["Le infrastrutture fisiche e gli artefatti tecnologici possono incorporare valori sociali e politici discriminatori","La progettazione urbanistica negli Stati Uniti è sempre stata orientata all\'inclusione sociale di tutte le etnie","I sottopassaggi furono progettati troppo bassi per errore di calcolo e non per ragioni di discriminazione","Le barriere architettoniche sono un problema esclusivamente contemporaneo legato alla disabilità fisica"], ans: 0, expl: "Winner: i sottopassaggi di Moses erano troppo bassi per i bus (riservati ai neri). Artefatto che incorpora valori e rafforza il sistema di classi.", cat: "ETICA"},
{q: "Il Web 2.0 è definito come:", opts: ["Il Web \'read-write\' dove chiunque può scrivere e pubblicare contenuti tramite blog, wiki e social network (people connectivity)","Il Web semantico dove i dati sono corredati di metadati in formato RDF per la comprensione automatica da parte delle macchine","La prima versione del World Wide Web, caratterizzata da pagine statiche consultabili in sola lettura da pochi utenti","Un protocollo di comunicazione crittografata che ha sostituito il protocollo HTTP standard nel 2010"], ans: 0, expl: "Web 2.0 = read-write (chiunque scrive tramite blog, wiki, social network). Web 3.0 = semantic web, machine-readable.", cat: "ETICA"},
{q: "ACTA, SOPA, PIPA e HADOPI sono esempi di:", opts: ["Standard tecnici per la sicurezza delle reti sviluppati dall\'Internet Engineering Task Force (IETF), anche in considerazione delle circostanze specifiche del caso","Tentativi legislativi di controllare la rete che rischiano di criminalizzare strumenti e comportamenti legittimi","Protocolli di crittografia avanzata per la protezione delle comunicazioni digitali dei cittadini europei","Organizzazioni no-profit internazionali che promuovono il software libero e i formati aperti di dati, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 1, expl: "ACTA, SOPA, PIPA, HADOPI sono tentativi legislativi di controllare la rete che rischiano di criminalizzare strumenti legittimi.", cat: "SOCDIG"},
{q: "Il ruolo etico dei motori di ricerca è una questione rilevante perché:", opts: ["I risultati oltre la prima pagina non vengono quasi mai consultati dal 95% degli utenti, conferendo ai motori un enorme potere nella selezione dei contenuti","I motori di ricerca pubblicano esclusivamente contenuti verificati e certificati da autorità governative, anche in considerazione delle circostanze specifiche del caso","L\'algoritmo di indicizzazione è completamente trasparente e accessibile a tutti gli utenti della rete, tenendo conto degli aspetti normativi e regolamentari applicabili","I motori di ricerca non hanno alcuna influenza sulla formazione del pensiero critico delle persone, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Se il 95% non va oltre la prima pagina, chi controlla i motori controlla l\'accesso alla conoscenza. Questione etica cruciale.", cat: "ETICA"},
{q: "In un mercato di concorrenza perfetta, l\'impresa è definita \'price-taker\' perché:", opts: ["La sua quota di mercato è talmente piccola che non può influenzare il prezzo, che è determinato dall\'incontro tra domanda e offerta","L\'impresa fissa il prezzo di vendita e i consumatori devono accettarlo senza possibilità di negoziazione, anche in considerazione delle circostanze specifiche del caso","Lo Stato regola i prezzi di tutti i beni e servizi venduti nel mercato attraverso apposite commissioni, tenendo conto degli aspetti normativi e regolamentari applicabili","I consumatori determinano il prezzo e le imprese devono adeguarsi ai livelli stabiliti dai compratori, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "In concorrenza perfetta ogni impresa ha quota di mercato minima e non può influenzare il prezzo. La curva di domanda è infinitamente elastica.", cat: "ECON"},
{q: "Nelle società di capitali, la separazione tra proprietà e controllo significa che:", opts: ["I soci (proprietari) delegano il potere di amministrare a uno o più amministratori eletti dall\'assemblea","Tutti i soci partecipano direttamente e personalmente alla gestione operativa quotidiana dell\'impresa","Non esiste distinzione tra la qualifica di socio e quella di amministratore nella struttura societaria","Il patrimonio personale dei soci è aggredibile per le obbligazioni sociali della società in ogni caso"], ans: 0, expl: "Nelle società di capitali c\'è separazione tra proprietà (soci) e controllo (amministratori eletti dall\'assemblea). I soci esercitano i diritti in assemblea.", cat: "ECON"}];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(questions) {
  return questions.map(q => {
    const correctText = q.opts[q.ans];
    const indices = Array.from({length: q.opts.length}, (_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    const newOpts = indices.map(i => q.opts[i]);
    const newAns = newOpts.indexOf(correctText);
    return { ...q, opts: newOpts, ans: newAns };
  });
}

const LETTERS = ["A", "B", "C", "D", "E"];

function BiometriaQuiz() {
  const [mode, setMode] = useState("menu");
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("aelse_theme") !== "light"; } catch(e) { return true; }
  });
  const toggleTheme = () => {
    const newMode = !darkMode;
    setDarkMode(newMode);
    try { localStorage.setItem("aelse_theme", newMode ? "dark" : "light"); } catch(e) {}
  };
  // Theme colors
  const T = darkMode ? {
    bg:"#0a0a0f", text:"#e0e0e0", textSoft:"#ccc", textMuted:"#888", textFaint:"#555",
    cardBg:"#1a1a2e", cardBg2:"#111118", cardBg3:"#111122", border:"#222", borderLight:"#333",
    inputBg:"#111118"
  } : {
    bg:"#f5f5f7", text:"#1a1a2e", textSoft:"#333", textMuted:"#666", textFaint:"#999",
    cardBg:"#ffffff", cardBg2:"#f0f0f5", cardBg3:"#e8e8f0", border:"#ddd", borderLight:"#ccc",
    inputBg:"#ffffff"
  };
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState(0);
  const [wrong, setWrong] = useState([]);
  const [startTime, setStartTime] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [isSimulation, setIsSimulation] = useState(false);
  const [timeLimit, setTimeLimit] = useState(null);
  const [showExitConfirm, setShowExitConfirm] = useState(false);
  const [isRipasso, setIsRipasso] = useState(false);
  const [ripassoCount, setRipassoCount] = useState(0);
  const [masteredCount, setMasteredCount] = useState(0);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showResetFinal, setShowResetFinal] = useState(false);
  const [showCert, setShowCert] = useState(false);
  const [certName, setCertName] = useState(() => {
    try { return localStorage.getItem("aelse_cert_name") || ""; } catch(e) { return ""; }
  });
  const [certGenerated, setCertGenerated] = useState(false);
  const certRedeemed = certName.trim().length > 0;
  const [streak, setStreak] = useState(() => {
    try { return parseInt(localStorage.getItem("aelse_streak_current")) || 0; } catch(e) { return 0; }
  });
  const [bestStreak, setBestStreak] = useState(() => {
    try { return parseInt(localStorage.getItem("aelse_streak_best")) || 0; } catch(e) { return 0; }
  });
  const [streakToast, setStreakToast] = useState(null);
  const streakToastTimer = useRef(null);
  const timerRef = useRef(null);

  // Streak helpers
  const STREAK_LEVELS = [
    {min:300, fires:"💀", msg:"Bro stai studiando troppo 💀", duration:4000, style:"skull"},
    {min:250, fires:"💀", msg:"Cooooosa?! 250 di fila?! Se non prendi 30L sei un pollo 😜", duration:4000, style:"skull"},
    {min:200, fires:"🔥🔥🔥🔥🔥🔥", msg:"200 di fila!", duration:2500, style:"epic"},
    {min:100, fires:"🔥🔥🔥🔥🔥", msg:"100 di fila!", duration:2500, style:"big"},
    {min:50,  fires:"🔥🔥🔥🔥", msg:"50 di fila!", duration:2000, style:"big"},
    {min:20,  fires:"🔥🔥🔥", msg:"20 di fila!", duration:2000, style:"big"},
    {min:10,  fires:"🔥🔥", msg:"10 di fila!", duration:2000, style:"big"},
    {min:5,   fires:"🔥", msg:"5 di fila!", duration:2000, style:"big"},
  ];
  const getStreakFires = (s) => {
    if (s >= 300) return "💀💀";
    if (s >= 250) return "💀";
    if (s >= 200) return "🔥🔥🔥🔥🔥🔥";
    if (s >= 100) return "🔥🔥🔥🔥🔥";
    if (s >= 50) return "🔥🔥🔥🔥";
    if (s >= 20) return "🔥🔥🔥";
    if (s >= 10) return "🔥🔥";
    if (s >= 5) return "🔥";
    if (s >= 1) return "🔥";
    return "";
  };
  const saveStreak = (current, best) => {
    try {
      localStorage.setItem("aelse_streak_current", current.toString());
      localStorage.setItem("aelse_streak_best", best.toString());
    } catch(e) {}
  };
  const triggerStreakToast = (newStreak) => {
    const level = STREAK_LEVELS.find(l => newStreak === l.min);
    if (!level) return;
    if (streakToastTimer.current) clearTimeout(streakToastTimer.current);
    setStreakToast({...level, count: newStreak});
    streakToastTimer.current = setTimeout(() => setStreakToast(null), level.duration);
  };
  const incrementStreak = () => {
    const newStreak = streak + 1;
    const newBest = Math.max(bestStreak, newStreak);
    setStreak(newStreak);
    setBestStreak(newBest);
    saveStreak(newStreak, newBest);
    triggerStreakToast(newStreak);
  };
  const resetStreak = () => {
    setStreak(0);
    try { localStorage.setItem("aelse_streak_current", "0"); } catch(e) {}
  };


  // localStorage helpers for ripasso
  const getRipassoSet = () => {
    try {
      const raw = localStorage.getItem("aelse_ripasso");
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch(e) { return new Set(); }
  };
  const saveRipassoSet = (s) => {
    try { localStorage.setItem("aelse_ripasso", JSON.stringify([...s])); } catch(e) {}
  };
  const addToRipasso = (questionText) => {
    const s = getRipassoSet();
    const idx = QUESTIONS.findIndex(q => q.q === questionText);
    if (idx !== -1) { s.add(idx); saveRipassoSet(s); }
  };
  const removeFromRipasso = (questionText) => {
    const s = getRipassoSet();
    const idx = QUESTIONS.findIndex(q => q.q === questionText);
    if (idx !== -1) { s.delete(idx); saveRipassoSet(s); }
  };

  // localStorage helpers for mastered (progress counter)
  const getMasteredSet = () => {
    try {
      const raw = localStorage.getItem("aelse_mastered");
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch(e) { return new Set(); }
  };
  const saveMasteredSet = (s) => {
    try { localStorage.setItem("aelse_mastered", JSON.stringify([...s])); } catch(e) {}
  };
  const addToMastered = (questionText) => {
    const s = getMasteredSet();
    const idx = QUESTIONS.findIndex(q => q.q === questionText);
    if (idx !== -1) { s.add(idx); saveMasteredSet(s); }
  };

  // Reset all progress
  const resetAllProgress = () => {
    try {
      localStorage.removeItem("aelse_ripasso");
      localStorage.removeItem("aelse_mastered");
      localStorage.removeItem("aelse_cert_name");
      localStorage.removeItem("aelse_streak_current");
      localStorage.removeItem("aelse_streak_best");
    } catch(e) {}
    setRipassoCount(0);
    setMasteredCount(0);
    setCertName("");
    setStreak(0);
    setBestStreak(0);
    setShowResetFinal(false);
    setShowResetConfirm(false);
  };


  // Update counts on mount and when returning to menu
  useEffect(() => {
    if (mode === "menu") {
      setRipassoCount(getRipassoSet().size);
      setMasteredCount(getMasteredSet().size);
    }
  }, [mode]);

  const startQuiz = (count, sim = false) => {
    const shuffled = shuffleOptions(shuffle(QUESTIONS).slice(0, count));
    setQuestions(shuffled);
    setCurrent(0);
    setSelected(null);
    setRevealed(false);
    setScore(0);
    setWrong([]);
    setStartTime(Date.now());
    setElapsed(0);
    setIsSimulation(sim);
    setIsRipasso(false);
    setTimeLimit(sim ? 2400 : null);
    setShowExitConfirm(false);
    setMode("quiz");
  };

  const startRipasso = () => {
    const ripassoIndices = getRipassoSet();
    if (ripassoIndices.size === 0) return;
    const ripassoQuestions = [...ripassoIndices].map(i => QUESTIONS[i]).filter(Boolean);
    const shuffled = shuffleOptions(shuffle(ripassoQuestions));
    setQuestions(shuffled);
    setCurrent(0);
    setSelected(null);
    setRevealed(false);
    setScore(0);
    setWrong([]);
    setStartTime(Date.now());
    setElapsed(0);
    setIsSimulation(false);
    setIsRipasso(true);
    setTimeLimit(null);
    setShowExitConfirm(false);
    setMode("quiz");
  };

  const startConquista = () => {
    const mastered = getMasteredSet();
    const unconquered = QUESTIONS.map((q, i) => ({...q, _origIdx: i})).filter((_, i) => !mastered.has(i));
    if (unconquered.length === 0) return;
    const picked = shuffle(unconquered).slice(0, Math.min(20, unconquered.length));
    const shuffled = shuffleOptions(picked);
    setQuestions(shuffled);
    setCurrent(0);
    setSelected(null);
    setRevealed(false);
    setScore(0);
    setWrong([]);
    setStartTime(Date.now());
    setElapsed(0);
    setIsSimulation(false);
    setIsRipasso(false);
    setTimeLimit(null);
    setShowExitConfirm(false);
    setMode("quiz");
  };

  useEffect(() => {
    if (mode === "quiz") {
      timerRef.current = setInterval(() => {
        const e = Math.floor((Date.now() - startTime) / 1000);
        setElapsed(e);
        if (isSimulation && e >= 2400) {
          clearInterval(timerRef.current);
          setMode("results");
        }
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [mode, startTime, isSimulation]);

  const handleSelect = (idx) => { if (!revealed) setSelected(prev => prev === idx ? null : idx); };

  const handleConfirm = () => {
    if (selected === null) return;
    setRevealed(true);
    const q = questions[current];
    if (selected === q.ans) {
      setScore(s => s + 1);
      if (isRipasso) removeFromRipasso(q.q);
      addToMastered(q.q);
      incrementStreak();
    } else {
      setWrong(w => [...w, { ...q, userAns: selected }]);
      addToRipasso(q.q);
      resetStreak();
    }
  };

  const handleNext = () => {
    if (current + 1 >= questions.length) {
      clearInterval(timerRef.current);
      setMode("results");
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const handleExit = () => setShowExitConfirm(true);
  const isCleanExit = revealed; // punto pulito = risposta già rivelata
  const confirmExit = () => {
    clearInterval(timerRef.current);
    if (!isCleanExit) resetStreak();
    setMode("menu");
    setShowExitConfirm(false);
  };
  const cancelExit = () => setShowExitConfirm(false);

  // Protect streak on refresh/close/navigate away
  useEffect(() => {
    const handleBeforeUnload = () => {
      if (mode === "quiz" && !revealed) {
        // Punto sporco: azzera streak in localStorage direttamente
        try { localStorage.setItem("aelse_streak_current", "0"); } catch(e) {}
      }
    };
    window.addEventListener("beforeunload", handleBeforeUnload);
    return () => window.removeEventListener("beforeunload", handleBeforeUnload);
  }, [mode, revealed]);

  const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
  const formatCountdown = (s) => { const r = Math.max(0, 2400 - s); return formatTime(r); };

  const calcGrade = (sc, tot) => {
    if (!isSimulation) return null;
    const ratio = sc / tot;
    const ref = 24/40; // 24/40 = 18
    if (ratio < ref) {
      return Math.max(0, Math.ceil(ratio / ref * 18));
    }
    if (ratio >= 1.0) return 31; // 30L
    const g = Math.ceil(18 + (ratio - ref) / (1 - ref) * 12);
    return Math.min(g, 30);
  };

  // MENU
  if (mode === "menu") {
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono','Fira Code',monospace",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{textAlign:"center",maxWidth:550,width:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <button onClick={()=>setMode("study")} style={{background:"transparent",border:"none",cursor:"pointer",padding:6,color:T.textMuted,transition:"color 0.2s"}} title="Modalità studio">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            <button onClick={toggleTheme} style={{background:"transparent",border:"none",cursor:"pointer",padding:6,color:T.textMuted,transition:"color 0.2s"}} title={darkMode?"Modalità giorno":"Modalità notte"}>
              {darkMode ? (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="12" cy="12" r="5" stroke="currentColor" strokeWidth="2"/>
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                </svg>
              ) : (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              )}
            </button>
          </div>
          <h1 style={{fontSize:24,color:"#ff4444",marginBottom:4,letterSpacing:2}}>SUPER TEST DI</h1>
          <h1 style={{fontSize:24,color:"#ff4444",marginTop:0,letterSpacing:2}}>ASPETTI ETICI DELL'INFORMATICA</h1>
          <p style={{color:T.textMuted,fontSize:12,marginBottom:24}}>Creato da Gabriele Lannutti</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {(() => {
              const unconqueredCount = QUESTIONS.length - masteredCount;
              const showConquista = unconqueredCount > 0;
              const shownCount = Math.min(20, unconqueredCount);
              const conquistaLabel = "DOMANDE NUOVE (" + shownCount + (shownCount === 1 ? " domanda non appresa)" : " domande non apprese)");
              const buttons = [
                {label:"QUIZ COMPLETO (40 domande casuali)",action:()=>startQuiz(40,true),color:"#ff4444"},
                showConquista
                  ? {label:conquistaLabel,action:startConquista,color:"#44aaff"}
                  : {label:"RIPASSO VELOCE (20 domande)",action:()=>startQuiz(20,false),color:"#44aaff"},
                {label:"TUTTE LE " + QUESTIONS.length + " DOMANDE",action:()=>startQuiz(QUESTIONS.length,false),color:"#aa44ff"},
              ];
              return buttons.map((btn,i)=>(
                <button key={i} onClick={btn.action}
                  style={{padding:"14px 20px",background:"transparent",border:`2px solid ${btn.color}`,color:btn.color,fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.target.style.background=btn.color;e.target.style.color="#0a0a0f"}}
                  onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color=btn.color}}>
                  {btn.label}
                </button>
              ));
            })()}

            {/* Easter egg button — only when all mastered */}
            {masteredCount >= QUESTIONS.length && !certRedeemed && (
              <button onClick={() => {setShowCert(true);setCertGenerated(false);}}
                style={{padding:"14px 20px",background:"transparent",border:"2px solid #c8860a",color:darkMode?"#ffd700":"#996600",fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s"}}
                onMouseEnter={e=>{e.target.style.background=darkMode?"#ffd700":"#c8860a";e.target.style.color="#0a0a0f"}}
                onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color=darkMode?"#ffd700":"#996600"}}>
                {"🏆 HAI APPRESO TUTTO — RITIRA IL CERTIFICATO"}
              </button>
            )}

            

            {ripassoCount > 0 && (
              <button onClick={startRipasso}
                style={{padding:"14px 20px",background:"transparent",border:"2px solid #00cc66",color:"#00cc66",fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s",marginTop:4}}
                onMouseEnter={e=>{e.target.style.background="#00cc66";e.target.style.color="#0a0a0f"}}
                onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color="#00cc66"}}>
                {"RIPASSO (" + ripassoCount + " domande da rivedere)"}
              </button>
            )}
          </div>

          {/* Unified stats box */}
          <div style={{marginTop:20,padding:"12px 16px",background:T.cardBg2,borderRadius:6,border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,color:T.textMuted}}>Domande apprese</span>
              <span style={{fontSize:13,fontWeight:900,color: masteredCount >= QUESTIONS.length ? "#00ff88" : masteredCount >= QUESTIONS.length*0.75 ? "#44aaff" : masteredCount >= QUESTIONS.length*0.5 ? "#ff8800" : "#ff4444"}}>{masteredCount}/{QUESTIONS.length}</span>
            </div>
            <div style={{height:6,background:darkMode?"#1a1a2e":"#ddd",borderRadius:3,overflow:"hidden",marginBottom: (streak > 0 || bestStreak > 0) ? 8 : 0}}>
              <div style={{height:"100%",borderRadius:3,transition:"width 0.5s ease",width:`${(masteredCount/QUESTIONS.length)*100}%`,background: masteredCount >= QUESTIONS.length ? "#00ff88" : masteredCount >= QUESTIONS.length*0.75 ? "#44aaff" : masteredCount >= QUESTIONS.length*0.5 ? "#ff8800" : "#ff4444"}}/>
            </div>
            {streak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom: bestStreak > 0 ? 4 : 0}}>
                <span style={{fontSize:11,color:T.textMuted}}>Streak attuale</span>
                <span style={{fontSize:12,fontWeight:700,color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>
              </div>
            )}
            {bestStreak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:T.textMuted}}>Miglior streak</span>
                <span style={{fontSize:12,fontWeight:700,color:"#e07020"}}>{getStreakFires(bestStreak)} {bestStreak}</span>
              </div>
            )}
          </div>

          {/* Reset — ghost button, very discreet */}
          {masteredCount > 0 && (
            <p onClick={() => setShowResetConfirm(true)} style={{color:darkMode?"#2a2a2a":"#ccc",fontSize:9,marginTop:12,cursor:"pointer",transition:"color 0.2s"}} onMouseEnter={e=>e.target.style.color=darkMode?"#555":"#888"} onMouseLeave={e=>e.target.style.color=darkMode?"#2a2a2a":"#ccc"}>Reset progresso</p>
          )}

          {/* Reset confirm — step 1 */}
          {showResetConfirm && !showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:T.cardBg,border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff8888",fontWeight:700}}>Attenzione</p>
                <p style={{fontSize:12,marginBottom:16,color:T.textSoft}}>Stai per cancellare tutto il progresso: domande apprese, domande da ripassare, streak attuale e record streak. Questa azione è irreversibile.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={() => setShowResetFinal(true)} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>CONTINUA</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}

          {/* Reset confirm — step 2 (final) */}
          {showResetConfirm && showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:T.cardBg,border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff4444",fontWeight:700}}>Sei davvero sicuro?</p>
                <p style={{fontSize:12,marginBottom:16,color:T.textSoft}}>Perderai {masteredCount} domande apprese, {ripassoCount} domande nel ripasso e il tuo record streak di {bestStreak}. Non si può tornare indietro.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={resetAllProgress} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>SÌ, CANCELLA TUTTO</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}


          {/* Certificate modal */}
          {showCert && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
              {/* Confetti */}
              {[...Array(40)].map((_,i) => (
                <div key={i} style={{
                  position:"fixed",
                  top:"-10px",
                  left: `${Math.random()*100}%`,
                  width: `${6+Math.random()*8}px`,
                  height: `${6+Math.random()*8}px`,
                  background: ["#ff4444","#ffd700","#00ff88","#44aaff","#aa44ff","#ff8800","#ff69b4","#00ccff"][i%8],
                  borderRadius: Math.random()>0.5 ? "50%" : "2px",
                  animation: `confetti-fall ${2+Math.random()*3}s linear ${Math.random()*2}s infinite, confetti-sway ${1+Math.random()*2}s ease-in-out ${Math.random()}s infinite alternate`,
                  zIndex:1001,
                  pointerEvents:"none"
                }}/>
              ))}

              <div style={{background:T.bg,borderRadius:12,padding:0,maxWidth:420,width:"100%",position:"relative",zIndex:1002}}>
                {!certGenerated ? (
                  <div style={{padding:32,textAlign:"center"}}>
                    <p style={{fontSize:40,marginBottom:8}}>🏆</p>
                    <h2 style={{color:"#ffd700",fontSize:20,marginBottom:8,fontFamily:"inherit"}}>HAI COMPLETATO TUTTO!</h2>
                    <p style={{color:T.textMuted,fontSize:12,marginBottom:24}}>{"Tutte le " + QUESTIONS.length + " domande apprese. Inserisci il tuo nome per generare il certificato."}</p>
                    <input
                      type="text"
                      value={certName}
                      onChange={e => setCertName(e.target.value)}
                      placeholder="Il tuo nome"
                      style={{width:"100%",padding:"10px 14px",background:T.inputBg,border:`1px solid ${T.borderLight}`,borderRadius:4,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none",textAlign:"center",marginBottom:16}}
                    />
                    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                      <button onClick={() => {if(certName.trim()){try{localStorage.setItem("aelse_cert_name",certName.trim())}catch(e){} setCertGenerated(true);}}}
                        style={{padding:"10px 24px",background: certName.trim()?"#ffd700":"#333",color:certName.trim()?"#0a0a0f":"#666",border:"none",borderRadius:4,fontWeight:700,cursor:certName.trim()?"pointer":"default",fontFamily:"inherit",fontSize:13,transition:"all 0.2s"}}>
                        GENERA CERTIFICATO
                      </button>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#555",border:"1px solid #333",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:0}}>
                    {/* Certificate */}
                    <div style={{
                      margin:20,
                      padding:32,
                      border:"2px solid #ffd700",
                      borderRadius:8,
                      background:"linear-gradient(145deg, #0d0d14, #111122)",
                      animation:"cert-glow 3s ease-in-out infinite",
                      textAlign:"center"
                    }}>
                      <p style={{fontSize:10,color:"#ffd700",letterSpacing:4,marginBottom:16,textTransform:"uppercase"}}>Certificato di Preparazione</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 16px",opacity:0.5}}/>
                      <p style={{fontSize:12,color:"#888",marginBottom:8,lineHeight:1.6}}>Si attesta che</p>
                      <p style={{fontSize:22,color:"#fff",fontWeight:900,marginBottom:8}}>{certName}</p>
                      <p style={{fontSize:12,color:"#888",lineHeight:1.6,marginBottom:16}}>
                        ha completato con successo tutte le <span style={{color:"#ffd700",fontWeight:700}}>{QUESTIONS.length}</span> domande del
                      </p>
                      <p style={{fontSize:14,color:"#ff4444",fontWeight:700,marginBottom:16}}>Aspetti Etici, Legali, Sociali ed Economici dell'Informatica</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 20px",opacity:0.5}}/>
                      <p style={{fontSize:10,color:"#666",marginBottom:4}}>Firmato</p>
                      <p style={{fontSize:14,color:"#ccc",fontStyle:"italic"}}>Gabriele Lannutti</p>
                      <p style={{fontSize:9,color:"#444",marginTop:16}}>{new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})}</p>
                    </div>
                    <div style={{textAlign:"center",padding:"0 20px 20px"}}>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#ffd700",border:"1px solid #ffd700",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // STUDY MODE
  if (mode === "study") {
    const CAT_ORDER = [
      {codes:["ECON"], name:"Economia, Mercati e Imprese"},
      {codes:["COSTI"], name:"Costi, Investimenti e Progetti"},
      {codes:["ETICA"], name:"Etica Informatica e Metodologie"},
      {codes:["PROPR"], name:"Proprietà Intellettuale e Diritto d'Autore"},
      {codes:["PRIV"], name:"Privacy e Protezione Dati"},
      {codes:["SOCDIG"], name:"Società Digitale e Cittadinanza"},
      {codes:["DEMOC"], name:"Democrazia e Partecipazione Digitale"},
      {codes:["SWLIB"], name:"Software Libero"},
    ];
    const LETTERS = ["A","B","C","D","E"];
    const grouped = {};
    QUESTIONS.forEach(q => {
      if (!grouped[q.cat]) grouped[q.cat] = [];
      grouped[q.cat].push(q);
    });
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono','Fira Code',monospace",padding:16,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h1 style={{fontSize:18,color:"#44aaff",margin:0}}>MODALITÀ STUDIO</h1>
            <button onClick={()=>setMode("menu")} style={{background:"transparent",border:"1px solid "+T.border,color:T.textMuted,fontSize:11,padding:"6px 14px",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>TORNA AL MENU</button>
          </div>
          <p style={{color:T.textMuted,fontSize:11,marginBottom:20}}>{QUESTIONS.length} domande organizzate in {CAT_ORDER.length} categorie. Tocca una categoria per espanderla.</p>
          {CAT_ORDER.map(cat => {
            const qs = (cat.codes || [cat.code]).flatMap(c => grouped[c] || []);
            if (qs.length === 0) return null;
            return (
              <details key={(cat.codes||[cat.code]).join("_")} style={{marginBottom:8}}>
                <summary style={{cursor:"pointer",padding:"10px 14px",background:T.cardBg,border:"1px solid "+T.border,borderRadius:4,fontSize:12,fontWeight:700,color:"#44aaff",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{cat.name}</span>
                  <span style={{color:T.textMuted,fontWeight:400,fontSize:11}}>{qs.length} domande</span>
                </summary>
                <div style={{borderLeft:"2px solid #44aaff",marginLeft:8,paddingLeft:12,marginTop:4}}>
                  {qs.map((q,i) => (
                    <div key={i} style={{background:T.cardBg,borderRadius:4,padding:12,marginBottom:6,fontSize:11,border:"1px solid "+T.border}}>
                      <p style={{color:T.text,fontWeight:600,marginBottom:8,lineHeight:1.4}}>{q.q}</p>
                      <p style={{color:"#00cc66",fontWeight:700,marginBottom:4}}>{q.opts[q.ans]}</p>
                      <p style={{color:T.textMuted,fontStyle:"italic",lineHeight:1.4,fontSize:10}}>{q.expl}</p>
                    </div>
                  ))}
                </div>
              </details>
            );
          })}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#44aaff",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // RESULTS
  if (mode === "results") {
    const pct = Math.round((score/questions.length)*100);
    const grade = calcGrade(score, questions.length);
    const gradeLabel = isSimulation ? (grade >= 18 ? `VOTO STIMATO: ${grade >= 31 ? "30 e Lode" : grade}/30` : `VOTO STIMATO: ${grade}/30 (INSUFFICIENTE)`) : null;
    const pctColor = pct>=90?"#00ff88":pct>=75?"#44aaff":pct>=60?"#ff8800":"#ff4444";
    const verdict = pct>=90?"ECCELLENTE":pct>=75?"BUONO":pct>=60?"SUFFICIENTE":"INSUFFICIENTE";
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono',monospace",padding:20,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <h1 style={{color:pctColor,fontSize:28,textAlign:"center"}}>{verdict}</h1>
          {isSimulation && grade !== null && <p style={{textAlign:"center",fontSize:20,color:grade>=18?"#00ff88":"#ff4444",fontWeight:900}}>{gradeLabel}</p>}
          <div style={{textAlign:"center",marginBottom:20}}>
            <span style={{fontSize:44,color:pctColor,fontWeight:900}}>{score}/{questions.length}</span>
            <span style={{color:T.textMuted,fontSize:13,display:"block"}}>({pct}%) — Tempo: {formatTime(elapsed)}</span>
          </div>
          {wrong.length>0&&(<div>
            <h2 style={{color:"#ff4444",fontSize:15,borderBottom:`1px solid ${T.borderLight}`,paddingBottom:8}}>ERRORI DA RIPASSARE ({wrong.length})</h2>
            {wrong.map((w,i)=>(
              <div key={i} style={{background:T.cardBg,borderLeft:"3px solid #ff4444",padding:12,marginBottom:10,borderRadius:4,fontSize:11}}>
                <p style={{color:"#ff8888",fontWeight:700,marginBottom:6}}>{w.q}</p>
                <p style={{color:"#00ff88"}}>{w.opts[w.ans]}</p>
                <p style={{color:T.textMuted,fontStyle:"italic",marginTop:4}}>{w.expl}</p>
              </div>
            ))}
          </div>)}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#ff4444",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // QUIZ
  const q = questions[current];
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono',monospace",display:"flex",flexDirection:"column"}}>
      {showExitConfirm && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:T.cardBg,border:`1px solid ${isCleanExit ? "#44aaff" : "#ff4444"}`,borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
            <p style={{fontSize:14,marginBottom:16,color:T.text}}>{isCleanExit
              ? "Vuoi tornare al menu? La tua streak è al sicuro."
              : "Vuoi davvero abbandonare? Hai una domanda aperta — la streak verrà azzerata."
            }</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={confirmExit} style={{padding:"8px 20px",background:isCleanExit?"#44aaff":"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{isCleanExit ? "TORNA AL MENU" : "SÌ, ESCI"}</button>
              <button onClick={cancelExit} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>ANNULLA</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.border}`,fontSize:12}}>
        <span style={{color:"#ff4444",fontWeight:700}}>{current+1}/{questions.length}</span>
        <div style={{display:"flex",gap:16}}>
          <span style={{color:"#00ff88"}}>✓ {score}</span>
          <span style={{color:"#ff4444"}}>✗ {wrong.length}</span>
          {streak > 0 && <span style={{color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>}
        </div>
        <span style={{color: isSimulation && (2400-elapsed)<300 ? "#ff4444" : T.textMuted}}>{isSimulation ? formatCountdown(elapsed) : formatTime(elapsed)}</span>
        <button onClick={handleExit} style={{background:"transparent",border:`1px solid ${T.textFaint}`,color:T.textMuted,fontSize:10,padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>ESCI</button>
      </div>
      <div style={{height:3,background:darkMode?"#1a1a2e":"#ddd"}}><div style={{height:"100%",background: isSimulation?"#ff4444":"#44aaff",width:`${((current+1)/questions.length)*100}%`,transition:"width 0.3s"}}/></div>
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:16,maxWidth:700,margin:"0 auto",width:"100%"}}>
        <p style={{fontSize:14,lineHeight:1.5,color:T.text,fontWeight:600,marginBottom:20,minHeight:50}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
          {q.opts.map((opt,i)=>{
            let bg="transparent",border=T.borderLight,col=T.textSoft;
            if(revealed){
              if(i===q.ans){bg=darkMode?"#0a2e0a":"#e6f9ed";border="#00ff88";col=darkMode?"#00ff88":"#007a3d"}
              else if(i===selected){bg=darkMode?"#2e0a0a":"#fde8e8";border="#ff4444";col="#ff4444"}
            } else if(i===selected){bg=darkMode?"#1a1a3e":"#e8eeff";border="#44aaff";col="#44aaff"}
            return(
              <button key={i} onClick={()=>handleSelect(i)}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:bg,border:`1.5px solid ${border}`,color:col,fontSize:12,fontFamily:"inherit",cursor:revealed?"default":"pointer",borderRadius:4,textAlign:"left",lineHeight:1.4,transition:"all 0.15s"}}>
                <span style={{fontWeight:900,minWidth:18,color:border===T.borderLight?T.textFaint:col}}>{LETTERS[i]}.</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>
        {/* Streak toast — above explanation */}
        {streakToast && (
          <div style={{
            display:"flex",
            justifyContent:"center",
            marginTop:8,
            animation: "toast-in 0.3s ease-out"
          }}>
            <div style={{
              padding: streakToast.style==="skull" ? "16px 24px" : streakToast.style==="epic" ? "12px 20px" : "10px 18px",
              background: streakToast.style==="skull" ? "rgba(100,0,180,0.95)" : streakToast.style==="epic" ? "rgba(170,68,255,0.2)" : "rgba(255,136,0,0.15)",
              border: streakToast.style==="skull" ? "2px solid #aa44ff" : streakToast.style==="epic" ? "1px solid rgba(170,68,255,0.5)" : "1px solid rgba(255,136,0,0.3)",
              borderRadius:8,
              textAlign:"center",
              animation: streakToast.style==="skull" ? "toast-skull-shake 0.8s ease-in-out" : streakToast.style==="epic" ? "toast-epic-pulse 1.5s ease-in-out infinite" : "toast-glow-pulse 1.5s ease-in-out infinite"
            }}>
              <p style={{
                fontSize: streakToast.style==="skull" ? 18 : streakToast.style==="epic" ? 15 : 14,
                fontWeight:700,
                color: streakToast.style==="skull" ? "#fff" : streakToast.style==="epic" ? "#aa44ff" : "#ff8800",
                fontFamily:"inherit",
                margin:0
              }}>
                {streakToast.fires} {streakToast.msg}
              </p>
            </div>
          </div>
        )}
        {revealed&&(
          <div style={{background:T.cardBg3,border:`1px solid ${T.borderLight}`,borderRadius:4,padding:12,marginTop:12,fontSize:11,lineHeight:1.5}}>
            <span style={{color:selected===q.ans?"#00ff88":"#ff4444",fontWeight:900}}>{selected===q.ans?"✓ CORRETTO":"✗ SBAGLIATO"}</span>
            <p style={{color:T.textMuted,marginTop:6}}>{q.expl}</p>
          </div>
        )}
        <div style={{marginTop:12,display:"flex",gap:10}}>
          {!revealed?(
            <button onClick={handleConfirm} disabled={selected===null}
              style={{flex:1,padding:"12px",background:selected!==null?"#44aaff":(darkMode?"#222":"#ddd"),color:selected!==null?"#000":(darkMode?"#555":"#999"),border:"none",fontSize:14,fontWeight:900,cursor:selected!==null?"pointer":"default",borderRadius:4,fontFamily:"inherit",transition:"all 0.2s"}}>
              CONFERMA
            </button>
          ):(
            <button onClick={handleNext}
              style={{flex:1,padding:"12px",background:"#ff4444",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>
              {current+1>=questions.length?"VEDI RISULTATI":"PROSSIMA →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(BiometriaQuiz));
  </script>
</body>
</html>
