  <title>Super Test di Aspetti Etici dell'Informatica</title>
  <style>

      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes confetti-sway {
      0%, 100% { margin-left: 0; }
      50% { margin-left: 50px; }
    }
    @keyframes cert-glow {

      50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
    }
    @keyframes toast-in {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes toast-out {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0; }
    }

    }

      0%, 100% { box-shadow: 0 0 20px rgba(170,68,255,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 40px rgba(170,68,255,0.8); transform: scale(1.02); }
    }
    @keyframes toast-skull-shake {

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

const QUESTIONS = [
{q: "La società in accomandita semplice:", opts: ["È una società di capitali con due tipi di soci: accomandatari (amministratori e limitatamente responsabili) e accomandanti (estranei all\'amministrazione e illimitatamente responsabili)","È una società di capitali con due tipi di soci: accomandatari (amministratori e illimitatamente responsabili) e accomandanti (estranei all\'amministrazione e illimitatamente responsabili)","È una società di persone con due tipi di soci: accomandatari (amministratori e illimitatamente responsabili) e accomandanti (estranei all\'amministrazione e limitatamente responsabili)","È una società di persone con due tipi di soci: accomandatari (estranei all\'amministrazione e limitatamente responsabili) e accomandanti (amministratori e illimitatamente responsabili)"], ans: 2, expl: "La SAS è una società di persone (non di capitali) con accomandatari che amministrano e rispondono illimitatamente, e accomandanti estranei all\'amministrazione con responsabilità limitata alla quota.", cat: "ECON"},
{q: "Cos\'è lo Stato Patrimoniale?", opts: ["Un prospetto che raccoglie e ordina i costi e ricavi di un certo esercizio, anche in considerazione delle circostanze specifiche del caso","Un prospetto che serve a stabilire a chi compete l\'utile generato nell\'esercizio, tenendo conto degli aspetti normativi e regolamentari applicabili","Un prospetto che ricapitola l\'andamento dei flussi finanziari nell\'arco di un esercizio","Un prospetto che fotografa la situazione di ricchezza dell\'azienda alla fine di un certo esercizio"], ans: 3, expl: "Lo Stato Patrimoniale fotografa la situazione di ricchezza (attività e passività) alla fine dell\'esercizio. A descrive il Conto Economico; B la distribuzione dell\'utile; C il rendiconto finanziario.", cat: "ECON"},
{q: "Da chi è rappresentato l\'insieme degli stakeholders di un\'impresa?", opts: ["Da coloro che acquistano e vendono azioni in Borsa","Da coloro che influenzano direttamente o possono influenzare le decisioni prese dall\'impresa","Dai portatori di interesse dal cui contributo dipende il funzionamento e la sopravvivenza dell\'impresa","Da coloro che portano capitale di rischio e quindi sono interessati al buon funzionamento dell\'impresa"], ans: 2, expl: "Lo stakeholder è un portatore di interessi dal cui contributo dipende il funzionamento e la sopravvivenza dell\'impresa. A descrive gli azionisti; C è parziale; D si limita ai soli shareholders.", cat: "ECON"},
{q: "Cos\'è il Conto Economico?", opts: ["Un prospetto che serve a stabilire a chi compete l\'utile generato nell\'esercizio","Un prospetto che fotografa la situazione di ricchezza dell\'azienda alla fine di un certo esercizio","Un prospetto che raccoglie e ordina i costi e ricavi di un certo esercizio","Un prospetto che ricapitola l\'andamento dei flussi finanziari nell\'arco di un esercizio"], ans: 2, expl: "Il Conto Economico raccoglie e ordina costi e ricavi di un esercizio, determinando utile o perdita. A riguarda la distribuzione dell\'utile; C è lo Stato Patrimoniale; D il rendiconto finanziario.", cat: "ECON"},
{q: "Il sistema economico:", opts: ["Definisce un mercato in cui domanda e offerta non subiscono restrizioni artificiose, anche in considerazione delle circostanze specifiche del caso","Coincide con l\'insieme delle imprese, che sono deputate alla produzione di beni e servizi economici, tenendo conto degli aspetti normativi e regolamentari applicabili","È definibile come l\'insieme delle relazioni di scambio fra attori che compiono scelte autonome nella destinazione di risorse","È il libero mercato, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "Il sistema economico è l\'insieme delle relazioni di scambio fra attori con scelte autonome nella destinazione di risorse. A descrive il libero mercato; C lo riduce alle imprese; D è una semplificazione.", cat: "ECON"},
{q: "Come si caratterizza un monopolio?", opts: ["Le imprese subiscono il prezzo imposto dal mercato","È una forma di mercato in cui la legge regolamenta l\'offerta di prodotti e servizi","È una forma di mercato in cui una sola impresa definisce l\'intera offerta","È una forma di mercato in cui la concorrenza è limitata dall\'esistenza di un Cartello"], ans: 2, expl: "Nel monopolio una sola impresa controlla l\'intera offerta, determinando prezzo, qualità e quantità. B confonde monopolio con regolamentazione; C descrive la concorrenza perfetta; D un oligopolio collusivo.", cat: "ECON"},
{q: "Cosa è un settore e come lo si individua?", opts: ["Una porzione di mercato individuata dalla omogeneità dei prodotti offerti, anche in considerazione delle circostanze specifiche del caso","Una porzione di mercato individuata da poche imprese che operano in regime di oligopolio, tenendo conto degli aspetti normativi e regolamentari applicabili","Una porzione di mercato individuata dalla omogeneità dei clienti, delle funzioni d\'uso dei prodotti e della tecnologia","Una porzione di mercato definita da una medesima tecnologia, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "Il settore è individuato dall\'omogeneità di clienti, funzioni d\'uso e tecnologia. A si limita ai prodotti; B descrive l\'oligopolio; D considera solo la tecnologia.", cat: "ECON"},
{q: "Il consorzio:", opts: ["È un\'organizzazione stabile, mediante la quale più persone volontarie si riuniscono e si accordano tra loro per perseguire scopi comuni di carattere sociale","Promuove l\'integrazione sociale attraverso la gestione di servizi sociosanitari ed educativi e lo svolgimento di attività finalizzate all\'inserimento lavorativo di persone svantaggiate","È un accordo tra due o più imprenditori che istituiscono un\'organizzazione comune per la disciplina o per lo svolgimento di determinate fasi delle rispettive imprese","Può essere \'di solidarietà sociale\' (gestisce servizi socio-sanitari/educativi) o \'di produzione e lavoro\' (svolge attività finalizzate all\'inserimento lavorativo di persone svantaggiate)"], ans: 2, expl: "Il consorzio è un accordo tra imprenditori per un\'organizzazione comune. B descrive la cooperativa sociale; C l\'associazione; D due tipologie di cooperative sociali.", cat: "ECON"},
{q: "La struttura organizzativa di un\'impresa:", opts: ["Serve a gestire più efficacemente progetti e investimenti, anche in considerazione delle circostanze specifiche del caso","È riflessa nella struttura dello Stato patrimoniale, tenendo conto degli aspetti normativi e regolamentari applicabili","Deve assicurare coordinamento, comunicazione efficace e integrazione tra le diverse componenti dell\'impresa","È riflessa nella catena del valore dell\'impresa, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "La struttura organizzativa è il backbone dell\'impresa: assicura coordinamento, comunicazione e integrazione. A è generica; C la confonde con il bilancio; D con la catena del valore.", cat: "ECON"},
{q: "Il payback period:", opts: ["Consente di valutare il valore attuale di un investimento, anche in considerazione delle circostanze specifiche del caso","Fornisce informazioni sulla redditività dei progetti nel tempo, tenendo conto degli aspetti normativi e regolamentari applicabili","Non dà informazioni sulla reddittività dei progetti, ma sulla loro rischiosità in termini temporali","Può dare informazioni sulla reddittività dei progetti a lungo termine, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "Il payback period misura il tempo per rientrare dell\'investimento, non la redditività. A descrive il VAN; B e D attribuiscono al payback informazioni sulla redditività.", cat: "COSTI"},
{q: "Le attività di supporto di un\'impresa sono:", opts: ["Logistica in entrata, gestione delle risorse umane (HR), logistica in uscita, marketing e vendite, servizio","Logistica in entrata, attività operative (operations), logistica in uscita, marketing e vendite, servizio","Approvvigionamento, sviluppo della tecnologia (R&D), gestione delle risorse umane (HR), attività infrastrutturali","Approvvigionamento, attività operative (operations), sviluppo della tecnologia (R&D), gestione delle risorse umane (HR), attività infrastrutturali"], ans: 2, expl: "Le attività di supporto di Porter: approvvigionamento, R&D, HR, infrastrutture. A e B mescolano primarie e supporto; D include operations (primaria).", cat: "COSTI"},
{q: "Per valutare adeguatamente una proposta d\'investimento:", opts: ["Il migliore indicatore è sempre rappresentato dal Tempo di pay-back, anche in considerazione delle circostanze specifiche del caso","È sempre necessario calcolare l\'IRR, tenendo conto degli aspetti normativi e regolamentari applicabili","È sempre opportuno scegliere il progetto che offre il rapporto più equilibrato tra opportunità e rischi","È sempre sufficiente applicare il criterio del VAN (o NPV), in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "Nessun singolo indicatore basta: i manager dovrebbero esaminare VAN, IRR, payback, ROI e scegliere il rapporto più equilibrato tra opportunità e rischi.", cat: "COSTI"},
{q: "A cosa serve la distinzione fra costi fissi e costi variabili?", opts: ["A stabilire l\'opportuno prezzo di vendita, tenendo conto degli aspetti normativi e regolamentari applicabili","A stabilire come imputare i costi indiretti, anche in considerazione delle circostanze specifiche del caso","A stabilire il numero di pezzi minimo da vendere per un prezzo dato","A stabilire il ricarico massimo applicabile, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "La distinzione permette il calcolo del break-even point: il numero minimo di pezzi da vendere per coprire i costi a un dato prezzo.", cat: "COSTI"},
{q: "Il tasso di attualizzazione (o tasso di sconto o di interesse):", opts: ["È il tasso con cui vanno confrontati gli investimenti per verificarne la redditività","Sposta tutti gli investimenti a un dato momento futuro","È il tasso attualmente praticato sul mercato per gli investimenti a rischio zero","Serve a riportare il valore degli investimenti al momento iniziale"], ans: 3, expl: "Il tasso di attualizzazione riporta i flussi di cassa futuri al momento iniziale. A descrive il tasso barriera; C il tasso risk-free; D la capitalizzazione.", cat: "COSTI"},
{q: "Nell\'analisi della catena del valore:", opts: ["Si generano anche alternative strategiche","Il premium price deriva da una corretta gestione dei driver di costo","La struttura di utilizzo della capacità produttiva nel tempo rappresenta un\'economia di scala","Localizzazione, learning e spillover possono costituire driver di unicità"], ans: 3, expl: "Localizzazione, learning e spillover sono driver di unicità e di costo nella catena del valore. A confonde catena del valore con strategia; C e D usano impropriamente i concetti.", cat: "COSTI"},
{q: "L\'analisi dei costi è utile:", opts: ["Solo quando l\'azienda produce molti prodotti diversi","Per determinare l\'esatto costo di produzione, e quindi definire il prezzo di vendita di un prodotto","Per determinare quanto i costi indiretti pesino sul costo medio variabile","Per stabilire il numero minimo di pezzi da vendere per un prodotto"], ans: 3, expl: "L\'analisi dei costi serve a stabilire il numero minimo di pezzi da vendere per raggiungere il pareggio. B è troppo forte; C confonde i concetti; D è una limitazione ingiustificata.", cat: "COSTI"},
{q: "Le interazioni tra investimento e impresa:", opts: ["Possono essere di natura \'reale\' (investimenti scorrelati con l\'attività dell\'impresa) e/o di natura finanziaria (investimenti che incidono sull\'attività dell\'impresa)","Riportano il valore degli investimenti al momento iniziale","Individuano una porzione di mercato definita da una medesima tecnologia","Possono essere di natura finanziaria (investimenti scorrelati con l\'attività dell\'impresa) e/o di natura \'reale\' (investimenti che incidono sull\'attività dell\'impresa)"], ans: 3, expl: "Le interazioni sono finanziarie (scorrelate) e/o reali (incidono sull\'attività). A inverte le definizioni; B descrive l\'attualizzazione; C il settore.", cat: "COSTI"},
{q: "Le macrofasi in cui è possibile suddividere un progetto sono:", opts: ["Individuazione di esigenze, Verifica di fattibilità, Analisi economica, Valutazione dei rischi","Obiettivo, risorse, project management","Disegno concettuale, Definizione, Pianificazione, Sequenziamento, Esecuzione, Terminazione","Reporting, Monitoraggio e Controllo, Modifica di specifiche, Controllo di qualità"], ans: 2, expl: "Le fasi del progetto: Disegno concettuale, Definizione, Pianificazione, Sequenziamento, Esecuzione, Terminazione. A sono sottofasi del disegno concettuale; B troppo generica; D attività di controllo.", cat: "COSTI"},
{q: "Etica è:", opts: ["Lo studio dell\'estetica al computer, in conformità con quanto previsto dalla disciplina vigente in materia, anche in considerazione delle circostanze specifiche del caso","Lo studio delle religioni antiche, anche in considerazione delle circostanze specifiche del caso, tenendo conto degli aspetti normativi e regolamentari applicabili","Lo studio della crosta terrestre, tenendo conto degli aspetti normativi e regolamentari applicabili, in conformità con quanto previsto dalla disciplina vigente in materia","Il ramo della Filosofia che studia i fondamenti razionali ed oggettivi del pensiero, delle azioni e delle scelte, permette di elaborare delle regole di comportamento e delle linee guida per le scelte che dobbiamo affrontare"], ans: 3, expl: "L\'etica è il ramo della Filosofia che studia i fondamenti delle azioni e delle scelte, permettendo di elaborare regole e linee guida.", cat: "ETICA"},
{q: "Lo storico della scienza e tecnologia M.Kranzberg formulò la frase:", opts: ["\'La tecnologia è cattiva\', anche in considerazione delle circostanze specifiche del caso","\'La tecnologia è buona\', tenendo conto degli aspetti normativi e regolamentari applicabili","\'La tecnologia non è né buona, né cattiva, è neutra\', in conformità con quanto previsto dalla disciplina vigente in materia","\'La tecnologia non è né buona, né cattiva, ma non è nemmeno neutra\'"], ans: 3, expl: "Kranzberg: \'Technology is neither good, nor bad, nor neutral\'. C aggiunge \'è neutra\', contraddicendo il messaggio.", cat: "ETICA"},
{q: "La prima pubblicazione che parla di Etica in ambito Informatico, \'Rules of Ethics in Information Processing\', è del:", opts: ["1990","1968","1970","1901"], ans: 1, expl: "Donn Parker pubblicò \'Rules of Ethics in Information Processing\' nel 1968 su Communications of the ACM.", cat: "ETICA"},
{q: "La Computer Ethics arriva in Europa con il Centre for Computing and Social Responsibility della De Monfort University, UK, nel:", opts: ["1956","2009","1969","1995"], ans: 3, expl: "Il CCSR della De Montfort University fu fondato nel 1995.", cat: "ETICA"},
{q: "Il primo computer programmabile è stato costruito da:", opts: ["Archimede, anche in considerazione delle circostanze specifiche del caso","Avogadro, tenendo conto degli aspetti normativi e regolamentari applicabili","Charles Babbage (1834)","Enrico Fermi"], ans: 2, expl: "Charles Babbage progettò l\'Analytical Engine nel 1834, il primo computer programmabile.", cat: "ETICA"},
{q: "Hacker significa:", opts: ["Persona di bassa statura, anche in considerazione delle circostanze specifiche del caso","Criminale informatico, tenendo conto degli aspetti normativi e regolamentari applicabili","Persona particolarmente esperta a programmare o a risolvere i problemi con i computer","Persona di alta statura, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "\'Hacker\' indica un esperto a programmare o risolvere problemi con i computer (Webster\'s Dictionary). Il termine per i criminali è \'cracker\'.", cat: "ETICA"},
{q: "Quale dilemma etico ci pongono i computer rispetto all\'ambiente?", opts: ["Come possiamo programmare in linguaggi ad alto livello?, anche in considerazione delle circostanze specifiche del caso","Come possiamo evitare o minimizzare i rischi ambientali e l\'impatto dei cicli di produzione dell\'hardware?","Come possiamo avere dispositivi di output molto veloci?, tenendo conto degli aspetti normativi e regolamentari applicabili","Quali dispositivi di input ci permettono di andare più veloci?, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il dilemma ambientale riguarda come minimizzare rischi e impatto dei cicli di produzione hardware.", cat: "ETICA"},
{q: "Come si possono migliorare le applicazioni informatiche nel luogo di lavoro?", opts: ["Usando un hardware dedicato, anche in considerazione delle circostanze specifiche del caso","Usando chip a 32 bit, tenendo conto degli aspetti normativi e regolamentari applicabili","Programmando in linguaggio C++, in conformità con quanto previsto dalla disciplina vigente in materia","Coinvolgendo i lavoratori e gli utenti finali nella progettazione dei nuovi sistemi"], ans: 3, expl: "Il Participatory Design prevede il coinvolgimento dei lavoratori e utenti finali nella progettazione.", cat: "ETICA"},
{q: "Perché nel 1985 lo scienziato dei computer David Parnas si dimette dal comitato governativo USA per il progetto \'Star Wars\' (Scudo Spaziale)?", opts: ["Per aiutare i militari nello sviluppo della \'cyber-war\', anche in considerazione delle circostanze specifiche del caso, anche in considerazione delle circostanze specifiche del caso","Per lanciare un segnale di responsabilità proveniente dalla comunità scientifica informatica e per denunciare i rischi dell\'applicazione dei computer in uno scenario di guerra","Per aiutare i militari nello sviluppo della guerra batteriologica, tenendo conto degli aspetti normativi e regolamentari applicabili, tenendo conto degli aspetti normativi e regolamentari applicabili","Per lanciare una nuova linea di computer, in conformità con quanto previsto dalla disciplina vigente in materia, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Parnas si dimise per responsabilità etica, denunciando i rischi dell\'applicazione dei computer in scenari di guerra.", cat: "ETICA"},
{q: "Il primo computer acquistabile sul mercato è stato:", opts: ["\'PC IBM\', della IBM, nel 1981, anche in considerazione delle circostanze specifiche del caso","\'M24\', della Olivetti, nel 1983, tenendo conto degli aspetti normativi e regolamentari applicabili","\'MacIntosh\', della Apple, nel 1984","\'UNIVAC I\', della Remongton Rand, nel 1951"], ans: 3, expl: "Lo UNIVAC I della Remington Rand (1951) fu il primo computer commerciale. PC IBM (1981), Olivetti M24 (1983), Macintosh (1984) vennero dopo.", cat: "ETICA"},
{q: "Le tre leggi morali della Società dell\'Informazione sono state introdotte da:", opts: ["Alan Turing, della Cambridge University, nel 1937","John Von Neumann, della Princeton University, nel 1932","Joseph Weizenbaum, del MIT, nel 1976","Claude Shannon, dei Bell Labs, nel 1943"], ans: 2, expl: "Weizenbaum formulò le tre leggi morali nel 1976 in \'Computer Power and Human Reason\'.", cat: "ETICA"},
{q: "Cosa propone il Codice Etico della Association for Computing Machinery (ACM)?", opts: ["Progettare i sistemi con discrezione, in conformità con quanto previsto dalla disciplina vigente in materia, anche in considerazione delle circostanze specifiche del caso","Tenere bassi i costi del software, anche in considerazione delle circostanze specifiche del caso, tenendo conto degli aspetti normativi e regolamentari applicabili","Programmare con giudizio, tenendo conto degli aspetti normativi e regolamentari applicabili, in conformità con quanto previsto dalla disciplina vigente in materia","Oltre a generici principi morali, vengono definite delle responsabilità specifiche per la comunità degli informatici: mantenere le proprie competenze, conoscere gli aspetti legali dell\'informatica, informare la società sui rischi e conseguenze dell\'informatica, ecc."], ans: 3, expl: "Il Codice Etico ACM definisce responsabilità specifiche per gli informatici: competenze, aspetti legali, informare sui rischi.", cat: "ETICA"},
{q: "Quali sono i passi della metodologia \'Stakeholders\' Network\' (SN)?", opts: ["1. Programmare in linguaggio macchina; 2. Testare il programma; 3. Distribuire il programma in codice binario","1. Descrizione dello scenario; 2. Disegno della SN; 3. Le questioni etiche; 4. Scenari alternativi","1. Programmare in linguaggio ad alto livello; 2. Trovare i bachi; 3. Verificare i problemi di sicurezza della Network","1. Disegnare il flow-chart; 2. Tradurlo in linguaggio macchina"], ans: 1, expl: "I passi sono: Descrizione scenario, Disegno SN, Questioni etiche, Scenari alternativi.", cat: "ETICA"},
{q: "Cosa si intende per era post-Turing?", opts: ["L\'era del software proprietario","La convergenza del Web 2.0 con il Web 3.0","L\'era dell\'hardware libero, anche in considerazione delle circostanze specifiche del caso","L\'era delle reti internazionali"], ans: 1, expl: "L\'era post-Turing è la convergenza del Web 2.0 (people connectivity) con il Web 3.0 (knowledge connectivity).", cat: "ETICA"},
{q: "Perché Deborah Johnson consiglia di rifiutare i computer come puri oggetti materiali?", opts: ["Perché i computer vanno programmati con linguaggi macchina (assembler, binario, ecc.), anche in considerazione delle circostanze specifiche del caso, anche in considerazione delle circostanze specifiche del caso","Perché qualsiasi artefatto (incluso il computer) non ha un significato, un senso, una utilità fino a che non viene incorporato in una pratica sociale, in una attività reale","Perché i computer non sono progettati da gente comune, tenendo conto degli aspetti normativi e regolamentari applicabili, tenendo conto degli aspetti normativi e regolamentari applicabili","Perché i computer sono oggetti immateriali, in conformità con quanto previsto dalla disciplina vigente in materia, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Johnson: la tecnologia non è un semplice artefatto ma un artefatto incorporato nelle pratiche sociali (co-shaping).", cat: "ETICA"},
{q: "Dove nasce il \'Participatory Design\' in informatica?", opts: ["In USA nel 1945, anche in considerazione delle circostanze specifiche del caso, anche in considerazione delle circostanze specifiche del caso","Il \'Participatory Design\' in ambito informatico nasce in Scandinavia negli anni \'70 quando gli utenti delle applicazioni software nei luoghi di lavoro vengono coinvolti nella progettazione","Negli anni \'30 in Unione Sovietica, tenendo conto degli aspetti normativi e regolamentari applicabili, tenendo conto degli aspetti normativi e regolamentari applicabili","In Inghilterra nel 1937, in conformità con quanto previsto dalla disciplina vigente in materia, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il Participatory Design nasce in Scandinavia negli anni \'70 coinvolgendo gli utenti nella progettazione.", cat: "ETICA"},
{q: "In cosa consiste per De George, il \'Danger of the Hidden Substructure\'?", opts: ["Il rischio di usare i computer per il gioco d\'azzardo, in conformità con quanto previsto dalla disciplina vigente in materia, anche in considerazione delle circostanze specifiche del caso","Il rischio di avere dei danni alla carriera a seguito dell\'uso dei computer, anche in considerazione delle circostanze specifiche del caso, tenendo conto degli aspetti normativi e regolamentari applicabili","Il rischio di usare il computer per sviluppare affari in modo illecito, tenendo conto degli aspetti normativi e regolamentari applicabili, in conformità con quanto previsto dalla disciplina vigente in materia","Il rischio di ignorare l\'impatto dei computer nella società legato al fatto che gran parte dello sviluppo dei computer avviene lontano dalla sfera pubblica"], ans: 3, expl: "Per De George il pericolo è ignorare l\'impatto dei computer perché lo sviluppo avviene lontano dalla sfera pubblica.", cat: "ETICA"},
{q: "Il \'dilemma di Collingridge\' dice che:", opts: ["Le questioni etiche dovrebbero essere affrontate durante il tempo libero, anche in considerazione delle circostanze specifiche del caso, anche in considerazione delle circostanze specifiche del caso","Le questioni etiche dovrebbero essere affrontate da persone esperte in estetica, tenendo conto degli aspetti normativi e regolamentari applicabili, tenendo conto degli aspetti normativi e regolamentari applicabili","Le questioni etiche dovrebbero essere affrontate alla fine della progettazione, in conformità con quanto previsto dalla disciplina vigente in materia, in conformità con quanto previsto dalla disciplina vigente in materia","Le questioni etiche dovrebbero essere affrontate presto durante la progettazione e lo sviluppo delle tecnologie ma nel suo stadio iniziale lo sviluppo di una tecnologia è difficile da predire"], ans: 3, expl: "Collingridge: le questioni etiche vanno affrontate presto, ma all\'inizio lo sviluppo è difficile da predire — paradosso tra necessità e possibilità.", cat: "ETICA"},
{q: "Perché abbiamo bisogno di una \'Computer Ethics\' secondo Gotterbarn?", opts: ["Perché i programmatori meritano di essere pagati bene, anche in considerazione delle circostanze specifiche del caso, anche in considerazione delle circostanze specifiche del caso","Perché i professionisti dell\'informatica non hanno bisogno di salari elevati, tenendo conto degli aspetti normativi e regolamentari applicabili, tenendo conto degli aspetti normativi e regolamentari applicabili","Perché i professionisti dell\'informatica hanno bisogno di salari elevati, in conformità con quanto previsto dalla disciplina vigente in materia, in conformità con quanto previsto dalla disciplina vigente in materia","Perché i computer hanno avuto uno sviluppo rapidissimo ma ad esso non ha corrisposto un analogo sviluppo del concetto di responsabilità per i professionisti dell\'informatica. L\'informatica non verrà mai riconosciuta come professione se non espande il suo senso di responsabilità"], ans: 3, expl: "Gotterbarn: sviluppo rapidissimo dei computer senza analogo sviluppo della responsabilità professionale.", cat: "ETICA"},
{q: "Una metodologia per affrontare le questioni etiche dell\'ICT può partire dalla domanda:", opts: ["Quale hardware dobbiamo acquistare?, anche in considerazione delle circostanze specifiche del caso","Quale linguaggio di programmazione usare?, tenendo conto degli aspetti normativi e regolamentari applicabili","C\'è qualcosa che potrebbe essere giusto o sbagliato in un progetto di informatica?","Quale software dobbiamo acquistare?, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "La domanda fondamentale per l\'analisi etica è: \'C\'è qualcosa che potrebbe essere giusto o sbagliato?\'", cat: "ETICA"},
{q: "Lo scambio di file (c.d. \'file sharing\') aventi ad oggetto opere protette dal diritto d\'autore è:", opts: ["Vietato solo se effettuato per fini di lucro","Vietato e punito con sanzioni di natura civile e penale","Generalmente vietato ma consentito se effettuato per uso personale","Consentito purché di modesta entità"], ans: 1, expl: "Il file sharing di opere protette è vietato e punito con sanzioni civili e penali, indipendentemente dal fine.", cat: "PROPR"},
{q: "I Digital Rights Management (DRM), sotto il profilo legale sono:", opts: ["La legge non contempla la figura di questi nuovi sistemi di protezione, anche in considerazione delle circostanze specifiche del caso","Sistemi sempre illeciti perché in violazione della legge sul diritto d\'autore, tenendo conto degli aspetti normativi e regolamentari applicabili","Sistemi la cui legittimità deve essere valutata in ragione dei diritti che vengono inibiti all\'utente","Sistemi sempre leciti perché espressamente previsti dalla legge sul diritto d\'autore, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "La legittimità dei DRM va valutata caso per caso in base ai diritti inibiti all\'utente.", cat: "PROPR"},
{q: "Un software distribuito con licenza freeware è:", opts: ["Un software distribuito congiuntamente al suo codice sorgente","Un software distribuito a titolo gratuito e congiuntamente al suo codice sorgente","Un software in relazione al quale è consentita per legge la duplicazione e la ridistribuzione","Un software distribuito a titolo gratuito"], ans: 3, expl: "Il freeware è software distribuito gratuitamente, ma senza codice sorgente (B confonde con open source).", cat: "PROPR"},
{q: "Una fotografia rinvenibile in Internet può essere liberamente riutilizzata:", opts: ["Se il browser consente di scaricarla senza alcun tipo di protezione, anche in considerazione delle circostanze specifiche del caso","Solo con il consenso dell\'autore, o se è espressamente distribuita con una licenza tale da consentirne il riutilizzo","Se non vi è la dicitura \'tutti i diritti riservati\' e, quindi, è da considerarsi di pubblico dominio, tenendo conto degli aspetti normativi e regolamentari applicabili","Sempre purché non a scopi commerciali, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Solo con consenso dell\'autore o licenza permissiva. L\'accessibilità tecnica non implica libertà d\'uso.", cat: "PROPR"},
{q: "Diffondere in Internet un vecchio film degli anni Settanta non più reperibile sui tradizionali circuiti di distribuzione è:", opts: ["Una condotta lecita, purché si disponga almeno di una copia originale del film","Una condotta lecita, purché il film venga distribuito gratuitamente","Una condotta lecita","Una condotta illecita"], ans: 3, expl: "Illecita: il diritto d\'autore dura 70 anni dalla morte dell\'autore, quindi un film degli anni \'70 è ancora protetto.", cat: "PROPR"},
{q: "Il progetto creative commons deve la sua paternità a:", opts: ["Bruce Perens","Tim Berners-Lee","Lawrence Lessig","Richard Stallman"], ans: 2, expl: "Lawrence Lessig è il fondatore del progetto Creative Commons.", cat: "PROPR"},
{q: "In base al principio di \'unitarietà dei segni distintivi\' la registrazione di un nome di dominio:", opts: ["Deve essere valutata a cura del richiedente in relazione alla possibile confondibilità del nome di dominio scelto con altri nomi di dominio, anche in considerazione delle circostanze specifiche del caso","È subordinata alla verifica da parte dell\'autorità competente per la registrazione dei domini circa la titolarità da parte del richiedente del medesimo marchio registrato","È riservata per legge al titolare del medesimo marchio registrato, tenendo conto degli aspetti normativi e regolamentari applicabili","Deve essere valutata a cura del richiedente in relazione alla possibile confondibilità del nome di dominio scelto con altri altri marchi, nomi di dominio, ed altri segni distintivi"], ans: 3, expl: "Il principio di unitarietà richiede la valutazione di confondibilità con tutti i segni distintivi (marchi, domini, ecc.).", cat: "PROPR"},
{q: "La legge italiana quale durata prevede per il diritto d\'autore:", opts: ["Cinquanta anni dalla data di pubblicazione dell\'opera","Settanta anni dalla data di pubblicazione dell\'opera","Cinquanta anni dalla morte dell\'autore","Settanta anni dalla morte dell\'autore"], ans: 3, expl: "70 anni dalla morte dell\'autore (L. 633/41 e successive modifiche).", cat: "PROPR"},
{q: "La normativa italiana in materia di proprietà industriale (c.d. \'Codice della proprietà industriale\') è:", opts: ["Il decreto legislativo 196/03","Il decreto legislativo 30/2005","La Legge 633/41","La Legge 675/96"], ans: 1, expl: "Il CPI è il D.Lgs. 30/2005. Il 196/03 è la privacy; la 633/41 il diritto d\'autore; la 675/96 la vecchia privacy.", cat: "PROPR"},
{q: "La normativa italiana vigente in materia di protezione dei dati personali è:", opts: ["La Direttiva 95/46/CE","Il decreto legislativo 196/03","La Legge 633/41, anche in considerazione delle circostanze specifiche del caso","La Legge 675/96, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 1, expl: "Il D.Lgs. 196/03 è il Codice in materia di protezione dei dati personali. La Direttiva 95/46/CE è la fonte europea.", cat: "PRIV"},
{q: "Con l\'espressione \'società dell\'informazione\' si intende:", opts: ["Una società nella quale l\'informazione non è soggetta ad alcuna legge, anche in considerazione delle circostanze specifiche del caso","Una società nella quale l\'informazione acquisisce valore prevalente rispetto ad altri beni","Una società nella quale l\'informazione viene controllata dagli organi di governo","Una società nella quale vi è un\'ampia diffusione dell\'istruzione, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 1, expl: "L\'informazione acquisisce valore prevalente rispetto ad altri beni nella società post-industriale.", cat: "PRIV"},
{q: "Nell\'ordinamento giuridico italiano l\'anonimato è:", opts: ["Una condizione non consentita in quanto contraria ad esigenze di pubblica sicurezza","Un diritto riconosciuto sempre e comunque a ciascun individuo","Un diritto riconosciuto in alcune specifiche ipotesi","Una figura non contemplata da alcuna disposizione di legge"], ans: 2, expl: "L\'anonimato è riconosciuto in specifiche ipotesi (diritto d\'autore, parto anonimo, tossicodipendenza).", cat: "PRIV"},
{q: "Uno dei principi fondamentali contenuti nel Codice in materia di protezione dei dati personali è:", opts: ["Il principio di \'tutela\'","Il principio di \'necessità\'","Il principio di \'ricorrenza\'","Il principio di \'protezione\'"], ans: 1, expl: "Il principio di necessità (art. 3): ridurre al minimo l\'uso di dati personali e identificativi.", cat: "PRIV"},
{q: "Il fornitore di un servizio online accessibile al pubblico a quali responsabilità è sottoposto in relazione ai contenuti pubblicati dagli utenti:", opts: ["Deve verificare che i contenuti non siano, in ogni caso, illeciti, anche in considerazione delle circostanze specifiche del caso","Deve verificare che i contenuti non siano in violazione delle norme sul diritto d\'autore, tenendo conto degli aspetti normativi e regolamentari applicabili","Non è sottoposto ad un obbligo generale di sorveglianza sui contenuti, ma piuttosto ad obblighi di collaborazione","Deve verificare che i contenuti non siano diffamatori o in violazione della privacy, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "Nessun obbligo generale di sorveglianza, ma obblighi di cooperazione (Direttiva 31/2000/CE).", cat: "PRIV"},
{q: "Il codice segreto (o \'PIN\') di una carta di credito è:", opts: ["Un dato sensibile","Un dato pubblico","Un dato anonimo","Un dato personale"], ans: 3, expl: "Il PIN è un dato personale (info relativa a persona identificabile). Non è sensibile (salute, opinioni politiche, ecc.).", cat: "PRIV"},
{q: "Per esprimere validamente il proprio consenso al trattamento di dati personali:", opts: ["È possibile sottoscrivere anche un modulo elettronico, ma è necessario utilizzare un sistema di firma digitale","È necessario sottoscrivere un documento cartaceo","È sufficiente un click del mouse","Il consenso è richiesto solo per le ipotesi di trattamenti di dati sensibili"], ans: 2, expl: "Il consenso per dati non sensibili può essere manifestato con un click, purché espresso, libero, specifico e consapevole.", cat: "PRIV"},
{q: "Il diritto alla libertà di manifestazione del pensiero tutela:", opts: ["Lo scritto, essenzialmente la stampa, tenendo conto degli aspetti normativi e regolamentari applicabili","La parola, anche in considerazione delle circostanze specifiche del caso","Qualsiasi forma espressiva e strumento attraverso la quale la persona manifesta il proprio pensiero","La parola e lo scritto, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "L\'art. 21 Cost.: \'con la parola, lo scritto, e ogni altro mezzo di diffusione\' — tutela qualsiasi forma.", cat: "PRIV"},
{q: "La normativa sulla privacy quali considera come valide \'credenziali di autenticazione\' ad un sistema informatico:", opts: ["Un dato biometrico","Un dispositivo hardware quale, ad esempio, una smart card","Una coppia di codici, user ID e password, associati all\'utente","Tutte e tre le soluzioni considerate"], ans: 3, expl: "Tutte e tre sono valide: biometria, smart card, user ID/password.", cat: "PRIV"},
{q: "Nell\'ordinamento giuridico statunitense quale disposizione di legge viene abitualmente invocata per tutelare la libertà di espressione negli ambienti digitali:", opts: ["Il Quinto Emendamento","La Dichiarazione dei diritti dell\'uomo","Il Primo Emendamento","Il Bill of Rights"], ans: 2, expl: "Il Primo Emendamento tutela la libertà di parola, stampa e espressione, anche in ambito digitale.", cat: "PRIV"},
{q: "L\'arcobaleno dei diritti della cittadinanza digitale…", opts: ["Specifica i livelli di accesso ai dati delle P.A.","Misura la felicità dei cittadini digitali","Misura l\'efficacia dell\'amministrazione pubblica","Specifica i livelli dei diritti del cittadino digitale"], ans: 3, expl: "L\'arcobaleno specifica i diversi livelli dei diritti del cittadino digitale, dal livello 0 al livello 7.", cat: "SOCDIG"},
{q: "L\'agorà greca era…", opts: ["Una democrazia rappresentativa","Una demagogia","Un\'oligarchia","Una democrazia diretta"], ans: 3, expl: "L\'agorà era una forma di democrazia diretta: i cittadini partecipavano personalmente alle decisioni.", cat: "DEMOC"},
{q: "Il ruolo dei \'computer professionals\':", opts: ["È quello di far funzionare i sistemi, anche in considerazione delle circostanze specifiche del caso","È aver bene chiaro quali siano gli impatti e le influenze delle tecnologie nella relazione cittadino-amministrazione","È quello di aiutare la popolazione a usare i computer, tenendo conto degli aspetti normativi e regolamentari applicabili","È quello di supportare il mondo politico nella creazione di sistemi deliberativi, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il ruolo è avere chiaro gli impatti delle tecnologie sulla relazione cittadino-amministrazione.", cat: "SOCDIG"},
{q: "Il Principio di Locard afferma…", opts: ["Le tracce che lasciamo sono sempre evidenti","Che le tracce sono disponibili all\'infinito","Ogni interazione con un ambiente provoca uno scambio","Ogni interazione con un ambiente è voluta, anche in considerazione delle circostanze specifiche del caso"], ans: 2, expl: "Ogni contatto lascia una traccia. Nel digitale ogni azione lascia tracce informatiche.", cat: "SOCDIG"},
{q: "Col termine \'webstacles\' si indica…", opts: ["Un insieme di tecniche per rendere difficile l\'accesso ai dati su web","Un insieme di tecniche per rendere incompatibile un sito con un particolare browser","La misura della accessibilità dei siti da parte dei diversamente abili","La misura della difficoltà di raggiungibilità di un sito tramite motori di ricerca"], ans: 2, expl: "I \'webstacles\' (web + obstacles) misurano l\'accessibilità dei siti per i diversamente abili.", cat: "SOCDIG"},
{q: "Il diritto all\'oblio…", opts: ["Fornisce la possibilità di dimenticare le informazioni","È equivalente al diritto di privacy","Fornisce il diritto di far cancellare certe informazioni","È il contrario del copyright"], ans: 2, expl: "Il diritto all\'oblio è il diritto di far cancellare informazioni personali non più rilevanti.", cat: "PRIV"},
{q: "Livello 1 arcobaleno:", opts: ["Diritto a usufruire di servizi online, pubblici e privati (e-services)","Diritto all\'accesso al servizio universale (access)","Diritto ad essere ascoltati e consultati (consultation)","Diritto a informare (inform: content provided by users)"], ans: 1, expl: "Livello 1 = accesso al servizio universale (access).", cat: "SOCDIG"},
{q: "Livello 2 arcobaleno:", opts: ["Diritto a informare (inform: content provided by users)","Diritto alla trasparenza (essere informati - transparency)","Diritto al coinvolgimento attivo nelle scelte e nelle politiche (active participation)","Diritto ad una educazione consapevole (education)"], ans: 1, expl: "Livello 2 = trasparenza (essere informati - transparency).", cat: "SOCDIG"},
{q: "Livello 4 arcobaleno:", opts: ["Diritto al coinvolgimento attivo nelle scelte e nelle politiche (active participation)","Diritto ad una educazione consapevole (education)","Diritto all\'accesso alla rete (the net)","Diritto alla trasparenza (essere informati - transparency)"], ans: 1, expl: "Livello 4 = educazione consapevole (education).", cat: "SOCDIG"},
{q: "L\'e-petitioning:", opts: ["È molto usato e ha la stessa efficacia rispetto alla raccolta firme tradizionale","È molto usato ma ha minore efficacia rispetto alla raccolta firme tradizionale","È ormai una realtà legale anche in Italia","È molto usato e ha maggiore efficacia rispetto alla raccolta firme tradizionale"], ans: 1, expl: "L\'e-petitioning è diffuso ma ha minore efficacia della raccolta firme tradizionale.", cat: "DEMOC"},
{q: "Il \'bilancio partecipato\'…", opts: ["È un modo per conoscere le spese di una amministrazione pubblica, anche in considerazione delle circostanze specifiche del caso","È un modo di contribuire alle decisioni sulle spese di una amministrazione pubblica","È un modo per impedire le spese di una amministrazione pubblica, tenendo conto degli aspetti normativi e regolamentari applicabili","È un modo di contribuire alle spese di una amministrazione pubblica, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il bilancio partecipato coinvolge i cittadini nelle decisioni sulle spese pubbliche.", cat: "DEMOC"},
{q: "La \'civic accountability\'…", opts: ["È la possibilità di vedere gli stipendi degli amministratori pubblici","È la possibilità di sapere e valutare l\'efficienza della amministrazione pubblica","È la possibilità di sapere nel dettaglio cosa fanno gli amministratori pubblici","È la possibilità di sapere quanto (e per cosa) spendono le amministrazioni pubbliche"], ans: 1, expl: "La civic accountability è la valutazione complessiva dell\'efficienza della PA.", cat: "DEMOC"},
{q: "Dittatura, Tirannia, Monarchia, Oligarchia, Plutocrazia, Tecnocrazia, Gerontocrazia hanno in comune…", opts: ["L\'alto grado di rappresentatività","L\'attenzione verso i problemi delle fasce deboli della popolazione","Il basso livello di democrazia","L\'alto livello di democrazia"], ans: 2, expl: "Tutte hanno in comune il basso livello di democrazia: il potere è concentrato.", cat: "DEMOC"},
{q: "Sono feature tipiche degli strumenti di \'idea gathering\':", opts: ["Inserimento di idee, commenti, valutazioni, integrazione con social network","Inserimento di idee, commenti, meccanismo di delega, organizzazione in tematiche","Inserimento di idee, wiki, valutazioni, organizzazione in tematiche","Inserimento di idee, commenti, valutazioni, organizzazione in tematiche"], ans: 3, expl: "Idea gathering: idee, commenti, valutazioni, organizzazione tematica. No delega (B), wiki (C) o social (D).", cat: "DEMOC"},
{q: "Un documento scansionato reso disponibile in PDF è OpenData…", opts: ["Livello 2 stelle","Livello 1 stella","Livello 5 stelle","Livello 4 stelle"], ans: 1, expl: "1 stella = disponibile online con licenza aperta in formato non strutturato (es. PDF scansionato).", cat: "DEMOC"},
{q: "Il patto partecipativo è…", opts: ["Un contratto commerciale","Un contratto notarile","Un contratto a termine","Un contratto sociale"], ans: 3, expl: "Il patto partecipativo è un contratto sociale tra cittadini e amministrazione.", cat: "DEMOC"},
{q: "Un ambiente di partecipazione civica è…", opts: ["Un sistema di voto, in conformità con quanto previsto dalla disciplina vigente in materia","Un ambiente fisico dove i cittadini possono riunirsi, anche in considerazione delle circostanze specifiche del caso","Un forum di discussione, tenendo conto degli aspetti normativi e regolamentari applicabili","Un sistema informatico per veicolare la partecipazione dei cittadini alla amministrazione pubblica"], ans: 3, expl: "È un sistema informatico strutturato per la partecipazione digitale alla PA.", cat: "DEMOC"},
{q: "Il \'lock-in\'…", opts: ["È un modo sia tecnico che commerciale per impedire che i clienti utilizzino sistemi informatici","È un formato di file che impedisce la lettura","È una tecnica crittografica","È un modo sia tecnico che commerciale per impedire che i clienti scelgano altri fornitori"], ans: 3, expl: "Il lock-in crea dipendenza dall\'ecosistema del fornitore impedendo il cambio.", cat: "SWLIB"},
{q: "Un programma gratuito è…", opts: ["Sempre Libero","Sempre proprietario","Sempre in pubblico dominio","A volte Libero"], ans: 3, expl: "Gratuito non implica libero: \'free as in beer\' ≠ \'free as in freedom\'. Un freeware può avere codice chiuso.", cat: "SWLIB"},
{q: "Le Creative Commons sono…", opts: ["Licenze d\'uso molto simili alle licenze libere","Licenze d\'uso riservate agli artisti","I beni a disposizione di tutti, anche in considerazione delle circostanze specifiche del caso","Le opere di pubblico dominio, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 0, expl: "Le CC sono licenze d\'uso simili alle libere: definiscono quali diritti l\'autore riserva e quali concede.", cat: "SWLIB"},
{q: "La concorrenza monopolistica si distingue dalla concorrenza perfetta perché:", opts: ["Il numero di imprese è molto ridotto e ciascuna tiene conto delle reazioni delle rivali, anche in considerazione delle circostanze specifiche del caso","Esiste una sola impresa che controlla l\'intera offerta del settore, tenendo conto degli aspetti normativi e regolamentari applicabili","Le imprese operano in un mercato con prodotti differenziati e ciascuna ha una curva di domanda con pendenza negativa","Le imprese sono price-taker e non possono influenzare il prezzo di mercato, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "Nella concorrenza monopolistica i prodotti sono differenziati e la curva di domanda ha pendenza negativa. A è l\'oligopolio; B il monopolio; D la concorrenza perfetta.", cat: "ECON"},
{q: "Nell\'oligopolio, le imprese sono consapevoli della loro interdipendenza perché:", opts: ["Il numero di imprese operanti nel settore è piccolo, quindi le azioni di ciascuna influenzano direttamente le altre","I prodotti offerti sono perfettamente omogenei e non esistono barriere all\'entrata, anche in considerazione delle circostanze specifiche del caso","Ciascuna impresa agisce in modo atomistico, ignorando i concorrenti, tenendo conto degli aspetti normativi e regolamentari applicabili","Il mercato è regolamentato da un\'autorità pubblica che impone i prezzi, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Nell\'oligopolio il numero ridotto fa sì che ciascuna impresa consideri le reazioni delle rivali.", cat: "ECON"},
{q: "Le economie di scala costituiscono una barriera all\'entrata perché:", opts: ["Impediscono alle imprese esistenti di aumentare i propri volumi produttivi nel breve periodo, anche in considerazione delle circostanze specifiche del caso","Riducono automaticamente i costi fissi per tutte le imprese del settore, indipendentemente dalla dimensione, tenendo conto degli aspetti normativi e regolamentari applicabili","Garantiscono l\'accesso privilegiato alle materie prime solo alle imprese di grandi dimensioni, in conformità con quanto previsto dalla disciplina vigente in materia","Obbligano il potenziale entrante a investire in grandi volumi produttivi per essere competitivo con le imprese già presenti"], ans: 3, expl: "Le economie di scala impongono grandi investimenti al nuovo entrante per costi unitari competitivi.", cat: "ECON"},
{q: "Il modello delle cinque forze competitive di Porter serve a:", opts: ["Determinare il costo medio variabile di produzione in un dato settore industriale, anche in considerazione delle circostanze specifiche del caso","Individuare le categorie di forze che determinano il livello di competizione e la profittabilità di un settore","Calcolare il punto di pareggio (break-even point) di un\'impresa all\'interno del proprio mercato, tenendo conto degli aspetti normativi e regolamentari applicabili","Classificare le forme giuridiche delle imprese operanti in un dato settore economico, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Porter analizza le forze che determinano competitività e profittabilità del settore.", cat: "ECON"},
{q: "Il punto di pareggio (break-even point) indica:", opts: ["Il tasso di rendimento minimo richiesto dall\'impresa per accettare un investimento produttivo, anche in considerazione delle circostanze specifiche del caso","Il livello di produzione al quale i ricavi totali eguagliano i costi totali, garantendo un utile pari a zero","La quantità ottimale di produzione che massimizza il margine operativo lordo dell\'impresa, tenendo conto degli aspetti normativi e regolamentari applicabili","Il momento temporale in cui un investimento inizia a generare flussi di cassa positivi, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il BEP è la quantità Q per cui ricavi = costi, utile zero. A è il tasso barriera; D il payback.", cat: "COSTI"},
{q: "Il margine di contribuzione unitario rappresenta:", opts: ["La differenza tra il ricavo unitario e il costo medio variabile unitario di un prodotto","La differenza tra il costo fisso totale e il costo variabile totale dell\'intera produzione","Il rapporto tra i ricavi totali e il numero di unità vendute in un esercizio","La quota di costo fisso che ciascuna unità di prodotto deve coprire per raggiungere l\'utile netto"], ans: 0, expl: "Margine di contribuzione = ricavo unitario − costo variabile unitario: quanto ciascuna unità contribuisce alla copertura dei costi fissi.", cat: "COSTI"},
{q: "Il criterio dell\'IRR (Internal Rate of Return) presenta il seguente limite:", opts: ["Non è sempre calcolabile, perché l\'equazione potrebbe non avere soluzioni reali o averne più di una","Non può mai essere confrontato con il tasso barriera dell\'impresa in nessuna circostanza","È applicabile esclusivamente a investimenti con durata inferiore ai cinque anni","Fornisce sempre gli stessi risultati del VAN, rendendolo ridondante come criterio di valutazione"], ans: 0, expl: "L\'IRR è calcolabile solo se l\'equazione NPV=0 ha soluzione unica reale. IRR e VAN possono dare responsi opposti.", cat: "COSTI"},
{q: "La Work Breakdown Structure (WBS) è:", opts: ["Una decomposizione gerarchica delle operazioni del progetto, rappresentata come un albero che fornisce una visione sistematica e condivisa","Un diagramma che mostra le relazioni temporali tra le attività attraverso frecce e nodi sequenziali, anche in considerazione delle circostanze specifiche del caso","Uno strumento che calcola il percorso critico di un progetto identificando le attività non comprimibili, tenendo conto degli aspetti normativi e regolamentari applicabili","Un sistema di reportistica che confronta i costi previsti con quelli effettivi nelle varie fasi del progetto, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "La WBS è una decomposizione gerarchica ad albero del progetto. B è un diagramma reticolare; C il CPM; D l\'earned value.", cat: "COSTI"},
{q: "Il Principio di Precauzione prevede che:", opts: ["Siano gli oppositori di una nuova tecnologia a dover dimostrare la sua pericolosità con evidenze scientifiche","Qualsiasi innovazione tecnologica debba essere vietata fino a quando non se ne dimostrino effetti esclusivamente positivi","L\'onere della dimostrazione di non-pericolosità spetti ai promotori dell\'azione quando vi è incertezza sulle conseguenze","Solo le autorità governative possano autorizzare lo sviluppo di nuove tecnologie informatiche"], ans: 2, expl: "Il Principio di Precauzione sposta l\'onere della prova: i promotori devono dimostrare la non-pericolosità.", cat: "ETICA"},
{q: "Secondo l\'approccio consequenzialista di John Stuart Mill:", opts: ["Un\'azione è giusta o sbagliata in base alle sue conseguenze e agli effetti sulla società, puntando a massimizzare la felicità collettiva","Un\'azione è giusta o sbagliata indipendentemente dalle conseguenze, in quanto possiede un valore intrinseco determinato dalla natura dell\'azione stessa","Non esistono norme universali e ciò che è giusto o sbagliato varia a seconda delle culture e dei sistemi sociali","La dignità della persona va rispettata in ogni circostanza e nessun individuo deve essere usato come mezzo"], ans: 0, expl: "Mill: valutare le azioni in base alle conseguenze sulla felicità del maggior numero di persone. B è Kant; C Spinoza; D ancora Kant.", cat: "ETICA"},
{q: "L\'approccio deontologico di Immanuel Kant all\'etica:", opts: ["Valuta un\'azione come giusta o sbagliata in sé, indipendentemente dalle motivazioni o dalle conseguenze","Ritiene che le norme morali siano relative e dipendano dal contesto culturale e storico in cui ci si trova","Considera giusta qualsiasi azione che massimizzi la felicità per il maggior numero di persone coinvolte","Sostiene che le decisioni etiche debbano essere demandate esclusivamente alle autorità religiose competenti"], ans: 0, expl: "Kant: un\'azione è giusta o sbagliata \'in sé\', a prescindere da motivazioni o conseguenze.", cat: "ETICA"},
{q: "Secondo Moor, il concetto di \'policy vacuum\' nell\'ambito della Computer Ethics indica:", opts: ["Una carenza di linee guida su come dovrebbero essere usati correttamente i computer, causata dalla velocità dell\'evoluzione tecnologica","La mancanza di personale qualificato nelle aziende produttrici di hardware e software di largo consumo","L\'assenza di una regolamentazione fiscale specifica per le imprese che operano nel settore delle tecnologie informatiche e della comunicazione","Un vuoto legislativo che impedisce la registrazione di brevetti software nei paesi europei"], ans: 0, expl: "Moor: \'policy vacuum\' = carenza di linee guida causata dalla velocità evolutiva dei computer.", cat: "ETICA"},
{q: "Il concetto di \'co-shaping\' tra tecnologia e società significa che:", opts: ["La tecnologia si sviluppa in modo autonomo e indipendente dalla società, determinandone il futuro in modo irreversibile, anche in considerazione delle circostanze specifiche del caso","La società impone alla tecnologia vincoli così stretti da impedirne qualsiasi evoluzione significativa, tenendo conto degli aspetti normativi e regolamentari applicabili","Solo il mercato e gli interessi economici determinano le direzioni dello sviluppo tecnologico, in conformità con quanto previsto dalla disciplina vigente in materia","La tecnologia e la società si influenzano reciprocamente: i fattori sociali orientano lo sviluppo tecnologico e la tecnologia plasma la società"], ans: 3, expl: "Co-shaping = influenza reciproca tra società e tecnologia. A è il determinismo tecnologico (rifiutato).", cat: "ETICA"},
{q: "Il diritto d\'autore tutela la forma espressiva di un\'opera, il brevetto tutela l\'idea. Questo significa che:", opts: ["Chi scrive un software originale è protetto dal diritto d\'autore per il codice sorgente, ma chiunque può creare un programma con le stesse funzioni usando codice diverso","Il primo a sviluppare un tipo di software ottiene automaticamente un brevetto che impedisce a chiunque di realizzare programmi simili, anche in considerazione delle circostanze specifiche del caso","Il diritto d\'autore protegge sia il codice sorgente sia l\'idea funzionale alla base del software, tenendo conto degli aspetti normativi e regolamentari applicabili","Il brevetto è l\'unica forma di protezione giuridica applicabile al software secondo la normativa dell\'ordinamento giuridico europeo, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Il diritto d\'autore protegge il codice (forma espressiva), non l\'idea: chiunque può fare software con stesse funzioni e codice diverso.", cat: "PROPR"},
{q: "La differenza principale tra Free Software e software Open Source è:", opts: ["Il Free Software distribuisce il codice sorgente per ragioni etiche legate alla libertà, l\'Open Source lo fa per ragioni di natura tecnica e qualitativa","Il Free Software è sempre distribuito gratuitamente e senza costo alcuno, mentre il software Open Source prevede sempre un pagamento, anche in considerazione delle circostanze specifiche del caso","Il Free Software non prevede alcuna licenza d\'uso, mentre l\'Open Source è regolato dalla licenza GPL, tenendo conto degli aspetti normativi e regolamentari applicabili","Il Free Software è sviluppato esclusivamente da volontari, l\'Open Source da aziende commerciali, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Free Software = motivazione etica (libertà). Open Source = motivazione tecnica (qualità). Entrambi distribuiscono il sorgente.", cat: "PROPR"},
{q: "Il contratto di licenza d\'uso di software si distingue dalla compravendita perché:", opts: ["Concede all\'utente la facoltà d\'uso del programma senza trasferire il diritto di proprietà sul software","Trasferisce la proprietà intellettuale del software dall\'autore all\'acquirente in forma definitiva","Può essere stipulato esclusivamente in forma scritta su supporto cartaceo con firma autografa","Non è mai giuridicamente vincolante per l\'utente finale, in quanto semplice informativa"], ans: 0, expl: "La licenza d\'uso concede l\'uso senza trasferire la proprietà. L\'accettazione (anche con un click) è vincolante.", cat: "PROPR"},
{q: "Sono considerati \'dati sensibili\' ai sensi del D.Lgs. 196/03:", opts: ["Qualsiasi dato personale relativo a una persona fisica identificata o identificabile, compreso il nome, anche in considerazione delle circostanze specifiche del caso","I dati idonei a rivelare origine razziale, convinzioni religiose, opinioni politiche, stato di salute e vita sessuale","I codici di accesso a sistemi informatici, i numeri di carte di credito e le password bancarie, tenendo conto degli aspetti normativi e regolamentari applicabili","Esclusivamente i dati contenuti in archivi pubblici accessibili tramite procedure telematiche, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "L\'elenco dei dati sensibili è tassativo: origine razziale/etnica, convinzioni religiose, opinioni politiche, stato di salute, vita sessuale.", cat: "PRIV"},
{q: "L\'autenticazione biometrica si basa su:", opts: ["L\'analisi di caratteristiche fisiche e/o comportamentali dell\'individuo per la sua identificazione e verifica","L\'invio di un codice temporaneo via SMS al numero di telefono registrato dall\'utente, anche in considerazione delle circostanze specifiche del caso","La combinazione obbligatoria di almeno tre dispositivi hardware diversi per ciascun accesso al sistema","L\'utilizzo esclusivo di password alfanumeriche di lunghezza superiore a sedici caratteri, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 0, expl: "Autenticazione biometrica = analisi di caratteristiche fisiche (impronta, iride, volto) e/o comportamentali (voce, firma).", cat: "PRIV"},
{q: "La diffamazione a mezzo Internet è considerata un\'ipotesi di diffamazione aggravata perché:", opts: ["Internet è riconducibile alla categoria degli \'altri mezzi di pubblicità\' prevista dall\'art. 595 del codice penale","Le comunicazioni su Internet sono sempre crittografate e quindi difficili da intercettare per le forze dell\'ordine","L\'autore di un contenuto diffamatorio online è sempre impossibile da identificare, impedendo qualsiasi sanzione","Le norme penali sulla diffamazione non si applicano ai contenuti pubblicati su piattaforme digitali"], ans: 0, expl: "Internet è un \'mezzo di pubblicità\' ai sensi dell\'art. 595, 3° comma, c.p. → fattispecie aggravata.", cat: "PRIV"},
{q: "La neutralità della rete (net neutrality) prevede che:", opts: ["I fornitori di servizi Internet possano offrire velocità differenti in base al prezzo pagato dall\'utente per la connessione, anche in considerazione delle circostanze specifiche del caso","Solo le istituzioni governative possano decidere quali contenuti sono accessibili sulla rete pubblica, tenendo conto degli aspetti normativi e regolamentari applicabili","Il traffico di dati venga trattato in modo egualitario dai nodi della rete, senza discriminazioni basate sulla tipologia di utente o contenuto","Gli utenti non possano in alcun caso utilizzare strumenti di crittografia per proteggere le comunicazioni, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "La neutralità prevede trattamento egualitario del traffico una volta in rete, senza discriminazione.", cat: "SOCDIG"},
{q: "Il livello 0 dell\'arcobaleno dei diritti della cittadinanza digitale corrisponde a:", opts: ["Il diritto all\'accesso alla rete (The Net), intesa come infrastruttura di base delle telecomunicazioni","Il diritto alla trasparenza, cioè il diritto ad essere informati dall\'amministrazione pubblica","Il diritto al coinvolgimento attivo nelle scelte e nelle politiche della pubblica amministrazione","Il diritto a un\'educazione consapevole sull\'uso delle tecnologie dell\'informazione, anche in considerazione delle circostanze specifiche del caso"], ans: 0, expl: "Livello 0 = The Net: accesso alla rete come precondizione di tutti gli altri diritti.", cat: "SOCDIG"},
{q: "La democrazia deliberativa si distingue dalla democrazia rappresentativa perché:", opts: ["Le decisioni vengono prese attraverso il dialogo pubblico informato, e la loro legittimità non deriva unicamente dal voto","I cittadini eleggono rappresentanti che, tramite il voto in parlamento, prendono tutte le decisioni legislative","Solo un gruppo ristretto di esperti tecnici ha il diritto di partecipare alle decisioni politiche, anche in considerazione delle circostanze specifiche del caso","Le decisioni sono prese esclusivamente tramite referendum popolari vincolanti senza alcuna fase di discussione, tenendo conto degli aspetti normativi e regolamentari applicabili"], ans: 0, expl: "Nella democrazia deliberativa la legittimità nasce dal dialogo pubblico, non solo dal conteggio dei voti.", cat: "DEMOC"},
{q: "LiquidFeedback è uno strumento che permette di:", opts: ["Formulare proposte, emendarle, votarle e delegare altri partecipanti con possibilità di revoca della delega","Effettuare esclusivamente sondaggi d\'opinione anonimi senza alcun meccanismo di voto vincolante, anche in considerazione delle circostanze specifiche del caso","Gestire la contabilità e il bilancio partecipato di un\'amministrazione comunale, tenendo conto degli aspetti normativi e regolamentari applicabili","Raccogliere firme certificate per petizioni popolari ai sensi della legislazione europea, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "LiquidFeedback: formulare, emendare, votare proposte e delegare/revocare (democrazia liquida).", cat: "DEMOC"},
{q: "Le quattro libertà del software libero secondo la Free Software Foundation sono:", opts: ["Libertà di scaricare il software gratuitamente, di non pagare aggiornamenti, di non subire pubblicità e di non fornire dati personali","Libertà di eseguire il software su un solo dispositivo, di non condividerlo, di non modificarlo e di non rivenderlo","Libertà di accedere al codice sorgente, di brevettare le modifiche, di vendere il software e di imporre restrizioni ai successivi utilizzatori","Libertà di usare il software per qualsiasi scopo, di studiarlo e modificarlo, di ridistribuirlo e di ridistribuire le versioni modificate"], ans: 3, expl: "Le 4 libertà FSF: uso, studio/modifica, ridistribuzione, ridistribuzione versioni modificate.", cat: "SWLIB"},
{q: "La licenza GNU GPL (General Public License) prevede che:", opts: ["Ogni software derivato da codice rilasciato sotto GPL deve a sua volta essere distribuito con la stessa licenza","Il codice sorgente può essere modificato ma le versioni modificate non possono essere ridistribuite, anche in considerazione delle circostanze specifiche del caso","Il software è utilizzabile solo per scopi non commerciali e in ambito accademico, tenendo conto degli aspetti normativi e regolamentari applicabili","L\'autore rinuncia a qualsiasi diritto sul codice, che diventa automaticamente di pubblico dominio, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "La GPL è copyleft: ogni derivato va ridistribuito con la stessa licenza.", cat: "SWLIB"},
{q: "Il divario digitale (digital divide) indica:", opts: ["La differenza di prezzo tra dispositivi hardware prodotti in paesi diversi del mondo, anche in considerazione delle circostanze specifiche del caso","La disuguaglianza nell\'accesso e nella fruizione delle tecnologie dell\'informazione tra diverse categorie sociali o popolazioni","Il gap temporale tra l\'uscita di una nuova tecnologia sul mercato e il suo effettivo utilizzo nelle imprese, tenendo conto degli aspetti normativi e regolamentari applicabili","La differenza di velocità tra le reti in fibra ottica e le tradizionali reti in rame per la telefonia fissa, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il digital divide è la disuguaglianza nell\'accesso e fruizione delle tecnologie.", cat: "SOCDIG"},
{q: "Il concetto di \'Network Society\' indica:", opts: ["Una società in cui la rete è esclusivamente uno strumento di intrattenimento per il tempo libero dei cittadini, anche in considerazione delle circostanze specifiche del caso","Un modello di organizzazione aziendale basato sull\'uso esclusivo di reti locali (LAN) per la comunicazione interna, tenendo conto degli aspetti normativi e regolamentari applicabili","Una società in cui le reti digitali trasformano le relazioni economiche, sociali e politiche, ridefinendo le strutture organizzative tradizionali","Una società in cui solo le istituzioni governative hanno accesso alle tecnologie di rete per scopi amministrativi, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "La Network Society (Castells) descrive la trasformazione delle relazioni sociali, economiche e politiche tramite le reti digitali.", cat: "SOCDIG"},
{q: "Il termine \'digital by default\' indica la tendenza di un\'amministrazione a:", opts: ["Erogare servizi pubblici primariamente in formato digitale, richiedendo ai cittadini di interagire online con la pubblica amministrazione","Stampare su carta tutti i documenti digitali prima di archiviarli nelle sedi amministrative competenti, anche in considerazione delle circostanze specifiche del caso","Limitare l\'accesso ai servizi pubblici ai soli cittadini che possiedono competenze informatiche certificate, tenendo conto degli aspetti normativi e regolamentari applicabili","Sostituire completamente il personale amministrativo con sistemi automatizzati di intelligenza artificiale, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Digital by default: servizi pubblici erogati primariamente online.", cat: "SOCDIG"},
{q: "Il Deep Packet Inspection (DPI) è una tecnica che permette di:", opts: ["Velocizzare automaticamente le connessioni Internet di tutti gli utenti senza alcuna distinzione di traffico, anche in considerazione delle circostanze specifiche del caso","Esaminare il contenuto dei pacchetti dati in transito sulla rete, andando oltre le semplici informazioni di instradamento","Crittografare tutte le comunicazioni in modo trasparente e senza intervento dell\'utente finale, tenendo conto degli aspetti normativi e regolamentari applicabili","Impedire fisicamente l\'accesso alla rete da parte di dispositivi non autorizzati tramite blocco hardware, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Il DPI esamina il contenuto dei pacchetti in transito, non solo le intestazioni.", cat: "SOCDIG"},
{q: "La censura DNS (DNS-based censorship) consiste nel:", opts: ["Rendere irraggiungibile un sito web eliminandone il nome dal sistema di risoluzione dei nomi di dominio","Aumentare la velocità di accesso a determinati siti web considerati prioritari dalle autorità governative","Impedire l\'invio di e-mail verso indirizzi appartenenti a domini registrati in paesi stranieri","Bloccare l\'installazione di software proveniente da repository non approvati dal fornitore di servizi"], ans: 0, expl: "La censura DNS fa sparire un sito censurandone il nome DNS. Metodo ingenuo, facilmente aggirabile.", cat: "SOCDIG"},
{q: "Perché una raccolta di idee diventi una \'consultazione\' su una politica pubblica devono verificarsi:", opts: ["La raccolta di almeno un milione di firme certificate e l\'approvazione del Parlamento europeo","La gestione esclusiva attraverso un software di voto elettronico certificato con garanzia di anonimato assoluto per tutti i partecipanti al processo","L\'avvio di soli sondaggi d\'opinione anonimi senza alcun impegno formale da parte delle istituzioni coinvolte","L\'avvio sulla base di un documento chiaro e trasparente su problemi e obiettivi, e l\'impegno dell\'istituzione a fornire feedback sulle proposte"], ans: 3, expl: "Secondo Regonini: documento esplicito + impegno a fornire feedback chiaro.", cat: "DEMOC"},
{q: "Nella classificazione a 5 stelle degli OpenData, un file Excel con licenza aperta corrisponde a:", opts: ["1 stella, perché è disponibile online ma in formato non leggibile da macchina senza software specifico","2 stelle, perché è disponibile in formato strutturato e leggibile da macchina, anche se proprietario","4 stelle, perché i dati utilizzano URI per identificare le risorse e sono collegati ad altri dataset","5 stelle, perché i dati sono collegati a dati di terze parti formando una rete di linked open data"], ans: 1, expl: "2 stelle = formato strutturato leggibile da macchina (es. Excel), anche se proprietario.", cat: "DEMOC"},
{q: "Il social reporting civico consiste nella possibilità per i cittadini di:", opts: ["Accedere ai profili personali dei funzionari pubblici sui social network per valutarne il comportamento privato","Inviare comunicazioni crittografate alle forze dell\'ordine per denunciare reati in forma completamente anonima","Pubblicare segnalazioni su disfunzioni di servizi e spazi pubblici, agendo come \'vedette civiche\'","Visualizzare in tempo reale le transazioni finanziarie di tutti gli enti pubblici del proprio comune di residenza"], ans: 2, expl: "Nei siti di social reporting i cittadini pubblicano segnalazioni agendo come \'vedette civiche\'.", cat: "DEMOC"},
{q: "La \'democrazia liquida\', implementata ad esempio da LiquidFeedback, si caratterizza per:", opts: ["Un meccanismo di delega su temi specifici e a tempo, revocabile dal delegante quando lo desidera","L\'obbligo per tutti i cittadini di votare personalmente su ogni singola questione senza possibilità di delegare","La selezione casuale dei decisori politici attraverso un algoritmo di sorteggio digitale certificato","L\'esclusione di qualsiasi forma di delega, imponendo la partecipazione diretta permanente"], ans: 0, expl: "Democrazia liquida: delega su temi, a tempo, revocabile.", cat: "DEMOC"},
{q: "La progettazione di uno spazio di partecipazione online richiede, prima della scelta del software:", opts: ["La definizione del logo e dell\'identità visiva della piattaforma digitale destinata ai cittadini, anche in considerazione delle circostanze specifiche del caso","La progettazione della struttura sociale: identificazione degli attori, del patto partecipativo e delle fasi del processo","L\'acquisto di server dedicati con capacità di calcolo sufficiente a gestire un numero elevato di utenti, tenendo conto degli aspetti normativi e regolamentari applicabili","La traduzione dell\'interfaccia in almeno tre lingue europee per rispettare le normative comunitarie, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "Prima del software: progettare la struttura sociale (attori, patto partecipativo, fasi, regole).", cat: "DEMOC"},
{q: "Il sistema operativo GNU/Linux nasce dalla combinazione di:", opts: ["Il sistema UNIX proprietario di AT&T e il browser Netscape Navigator sviluppato da Marc Andreessen","Il sistema operativo Windows di Microsoft e il progetto Apache della Apache Software Foundation","Il kernel HURD sviluppato dalla Free Software Foundation e il desktop environment KDE, anche in considerazione delle circostanze specifiche del caso","Il progetto GNU di Richard Stallman (strumenti e librerie) e il kernel Linux sviluppato da Linus Torvalds"], ans: 3, expl: "GNU/Linux = progetto GNU (Stallman, 1985: compilatore, editor, librerie) + kernel Linux (Torvalds, 1991).", cat: "SWLIB"},
{q: "Una clausola tipica di una End User License Agreement (EULA) di software proprietario prevede:", opts: ["La possibilità di installare il software su un numero illimitato di dispositivi senza alcuna restrizione","Il divieto di modificare, ripubblicare e fare uso commerciale del software concesso in licenza","L\'obbligo per il produttore di rilasciare il codice sorgente del software entro trenta giorni dall\'acquisto","La garanzia illimitata e il rimborso totale in caso di qualsiasi malfunzionamento del prodotto"], ans: 1, expl: "Le EULA proprietarie vietano modifica, ripubblicazione e uso commerciale non autorizzato.", cat: "SWLIB"},
{q: "La strategia del software proprietario mira a:", opts: ["Rendere disponibile il codice sorgente alla comunità per favorire la collaborazione e il miglioramento del prodotto","Creare dipendenza dell\'utente dal prodotto (lock-in), impedendo che i dati siano fruibili con altri software","Ridurre al minimo i costi di sviluppo rinunciando a qualsiasi forma di protezione legale sul codice","Favorire la concorrenza tra sviluppatori attraverso standard aperti e formati interoperabili di scambio dati"], ans: 1, expl: "La strategia proprietaria punta al lock-in: impedire usi \'non corretti\' e creare dipendenza dal prodotto.", cat: "SWLIB"},
{q: "L\'affermazione \'il software libero è insicuro o pieno di bug\' è considerata un luogo comune perché:", opts: ["Il software libero non viene mai testato prima del rilascio e non prevede alcuna forma di controllo qualità, anche in considerazione delle circostanze specifiche del caso","Solo il software proprietario è soggetto a vulnerabilità di sicurezza, mentre il codice aperto è immune per definizione, tenendo conto degli aspetti normativi e regolamentari applicabili","I sistemi operativi liberi come GNU/Linux sono ampiamente utilizzati nei server (oltre il 60%) e nei supercomputer, dimostrando robustezza e affidabilità","Il software libero non è mai stato utilizzato in ambienti di produzione reali ma solo in contesti accademici sperimentali, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 2, expl: "GNU/Linux è il SO più diffuso sui server (>60%) e supercomputer, dimostrando robustezza. Il codice aperto permette alla comunità di trovare e correggere bug.", cat: "SWLIB"},
{q: "Il principio di necessità nel trattamento dei dati personali (art. 3 del D.Lgs. 196/03) prevede che:", opts: ["Tutti i dati personali degli utenti debbano essere conservati per un periodo minimo di dieci anni, anche in considerazione delle circostanze specifiche del caso","I titolari del trattamento possano raccogliere qualsiasi tipologia di dato personale purché ne diano formale comunicazione all\'interessato tramite informativa, tenendo conto degli aspetti normativi e regolamentari applicabili","Solo i dati sensibili siano soggetti a limitazioni nel trattamento, mentre i dati personali comuni siano liberamente utilizzabili, in conformità con quanto previsto dalla disciplina vigente in materia","I sistemi informativi siano configurati riducendo al minimo l\'utilizzo di dati personali, escludendo il trattamento quando le finalità possono essere raggiunte con dati anonimi"], ans: 3, expl: "Principio di necessità: ridurre al minimo l\'uso di dati personali, preferendo dati anonimi quando possibile.", cat: "PRIV"},
{q: "In base al disciplinare tecnico del D.Lgs. 196/03, la password deve:", opts: ["Essere composta da almeno otto caratteri, non contenere riferimenti facilmente riconducibili all\'incaricato e essere modificata almeno ogni sei mesi","Essere comunicata a tutti i colleghi dell\'ufficio per garantire la continuità operativa in caso di assenza, anche in considerazione delle circostanze specifiche del caso","Coincidere con il codice fiscale dell\'incaricato per facilitarne la memorizzazione e l\'identificazione, tenendo conto degli aspetti normativi e regolamentari applicabili","Essere modificata esclusivamente al momento della cessazione del rapporto di lavoro con il titolare, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 0, expl: "Almeno 8 caratteri, nessun riferimento all\'incaricato, modifica ogni 6 mesi (3 per dati sensibili).", cat: "PRIV"},
{q: "Il profilo di autorizzazione informatica serve a:", opts: ["Identificare il soggetto che vuole accedere al sistema informatico verificandone le credenziali di autenticazione, anche in considerazione delle circostanze specifiche del caso","Limitare l\'accesso di ciascun incaricato autenticato ai soli dati personali e alle sole operazioni di trattamento previsti dal suo profilo","Crittografare tutte le comunicazioni interne dell\'organizzazione in modo automatico e trasparente, tenendo conto degli aspetti normativi e regolamentari applicabili","Generare copie di backup dei dati personali con cadenza giornaliera su supporti esterni rimovibili, in conformità con quanto previsto dalla disciplina vigente in materia"], ans: 1, expl: "L\'autorizzazione (dopo l\'autenticazione) limita l\'accesso ai soli dati e operazioni previsti dal profilo. A è l\'autenticazione.", cat: "PRIV"},
